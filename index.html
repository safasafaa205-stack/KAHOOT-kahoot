<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مختبر الإبداع - صفاء المصري</title>
    <script src="https://cdnjs.cloudflare.com"></script>
    <style>
        :root { --gold: #D4AF37; --cyan: #00f2ff; --bg: #0d0d0d; }
        body { font-family: 'Cairo', sans-serif; margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; background: var(--bg); color: white; overflow: hidden; }
        #game-container { background: #1a1a1a; width: 95%; max-width: 800px; padding: 30px; border-radius: 30px; border: 2px solid var(--gold); text-align: center; box-shadow: 0 0 40px rgba(0, 242, 255, 0.15); position: relative; max-height: 90vh; overflow-y: auto; }
        
        /* أفاتار 3D حي */
        .avatar-3d { width: 120px; height: 120px; margin: 0 auto 20px; position: relative; animation: float 4s infinite ease-in-out; }
        .bot-head { width: 90px; height: 80px; background: #333; border-radius: 20px; border: 2px solid var(--cyan); margin: 0 auto; position: relative; box-shadow: 0 0 15px var(--cyan); }
        .visor { width: 70%; height: 15px; background: var(--cyan); position: absolute; top: 25%; left: 15%; border-radius: 10px; box-shadow: 0 0 10px var(--cyan); overflow: hidden; }
        .scan-line { width: 15px; height: 100%; background: #fff; position: absolute; animation: scan 2s infinite linear; }
        @keyframes scan { from { left: -15px; } to { left: 100%; } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .bot-mouth { width: 30px; height: 4px; background: var(--cyan); position: absolute; bottom: 20%; left: 30px; border-radius: 5px; transition: 0.3s; }

        .question-box { font-size: 1.3rem; margin: 20px 0; padding: 25px; background: rgba(0,0,0,0.5); border-radius: 15px; border-right: 5px solid var(--gold); line-height: 1.7; text-align: right; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .option-btn { padding: 18px; border: 1px solid var(--gold); border-radius: 12px; background: transparent; color: white; cursor: pointer; font-weight: 600; font-size: 1rem; transition: 0.3s; }
        .option-btn:hover { background: var(--gold); color: #000; }
        .correct { background: #00ff88 !important; color: #000 !important; }
        .wrong { background: #ff3333 !important; color: #fff !important; }

        .btn-action { background: var(--cyan); color: #000; padding: 15px 40px; border: none; border-radius: 50px; font-size: 1.1rem; cursor: pointer; font-weight: bold; margin-top: 25px; }
        input { padding: 12px; width: 80%; border-radius: 10px; border: 1px solid var(--gold); margin: 8px; background: #222; color: white; text-align: center; }

        @media print { .no-print, .btn-action, .avatar-3d { display: none !important; } body { background: white; color: black; } #game-container { border: 1px solid #000; box-shadow: none; width: 100%; } .question-box { color: black !important; } }
        #quiz-section, #score-container { display: none; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="avatar-3d no-print"><div class="bot-head"><div class="visor"><div class="scan-line"></div></div><div class="bot-mouth" id="mouth"></div></div></div>

    <div id="start-screen">
        <h1 style="color: var(--gold);">مختبر الذكاءات المتعددة 🧪</h1>
        <h3 style="color: var(--cyan);">بإشراف الأخصائية: صفاء المصري</h3>
        <p>تربية خاصة - موهبة وإبداع</p>
        <input type="text" id="p-name" placeholder="اسم المتقدم للمسابقة"><br>
        <input type="text" id="p-class" placeholder="الصف الدراسي"><br>
        <button class="btn-action" onclick="startGame()">بدأ تحليل النمط الذهني ⮕</button>
    </div>

    <div id="quiz-section">
        <div id="q-text" class="question-box"></div>
        <div id="opts-grid" class="options-grid"></div>
        <button id="nxt" class="btn-action" style="display:none;" onclick="nextQ()">السؤال التالي</button>
    </div>

    <div id="score-container">
        <h2 style="color: var(--gold);">تقرير تحليل الموهبة النهائي</h2>
        <div id="f-info" style="margin-bottom: 20px; font-weight: bold;"></div>
        <h1 id="f-score" style="font-size: 3.5rem;"></h1>
        <div id="award" style="font-size: 1.3rem; margin: 15px;"></div>
        <table id="rep" style="width:100%; border-collapse: collapse; margin-top:20px; text-align: right; background: rgba(255,255,255,0.05);">
            <tbody id="rep-body"></tbody>
        </table>
        <div class="no-print">
            <button class="btn-action" onclick="window.print()">طباعة السجل 🖨️</button>
            <button class="btn-action" onclick="location.reload()" style="background:#444; color:#fff;">إعادة التحليل</button>
        </div>
    </div>
</div>

<audio id="aud-win" src="https://www.soundjay.com"></audio>
<audio id="aud-lose" src="https://www.soundjay.com"></audio>

<script>
    const quizData = [
        { q: "1. إذا أُعطيت جهازاً إلكترونياً معطلاً، هل ستحاول فتحه فوراً لاكتشاف ميكانيكية عمله من الداخل؟", a: ["الذكاء الحركي", "الذكاء اللغوي"], c: 0 },
        { q: "2. هل تستطيع كشف 'كذبة' أو 'تزويف مشاعر' لشخص ما بمجرد مراقبة تعابير وجهه العفوية؟", a: ["الذكاء الاجتماعي", "الذكاء الطبيعي"], c: 0 },
        { q: "3. هل تميل لربط تشابه العروق في أوراق الشجر بنظام جريان الأنهار في خرائط الجغرافيا؟", a: ["الذكاء الطبيعي", "الذكاء الموسيقي"], c: 0 },
        { q: "4. هل تلاحظ الإيقاعات غير المنتظمة في أصوات محرك السيارة أو قطرات الماء وتستطيع تقليدها؟", a: ["الذكاء الموسيقي", "الذكاء المنطقي"], c: 0 },
        { q: "5. هل تستمتع باستخدام التشبيهات الغريبة (مثل: الصمت كالبحر العميق) لوصف حالات يصعب شرحها؟", a: ["الذكاء اللغوي", "الذكاء الحركي"], c: 0 },
        { q: "6. هل يمكنك بناء مجسم معقد لمبنى في عقلك ووصف تفاصيله من الداخل دون رسمه؟", a: ["الذكاء المكاني", "الذكاء الاجتماعي"], c: 0 },
        { q: "7. هل تجلس مع نفسك لتحليل أسباب غضبك وتضع خطة لتغيير ردود أفعالك مستقبلاً؟", a: ["الذكاء الذاتي", "الذكاء الوجودي"], c: 0 },
        { q: "8. هل تشغل بالك أسئلة مثل: 'لماذا خُلق الكون بهذا الاتساع؟' و 'ما هي الحقيقة المطلقة؟'", a: ["الذكاء الوجودي", "الذكاء الرقمي"], c: 0 },
        { q: "9. هل تستمتع بإيجاد 'القاسم المشترك' أو النمط الخفي بين مجموعة أرقام تبدو متباعدة؟", a: ["الذكاء المنطقي", "الذكاء اللغوي"], c: 0 },
        { q: "10. هل ترفض القيام بفعل يقلده الجميع لمجرد أنك تشعر داخلياً أنه يتناقض مع مبادئك؟", a: ["الذكاء الأخلاقي", "الذكاء الاجتماعي"], c: 0 },
        { q: "11. هل تبتكر أمثلة توضيحية من بيئة الطالب لتبسيط فكرة صعبة لزملائك في الصف؟", a: ["الذكاء التعليمي", "الذكاء الطبيعي"], c: 0 },
        { q: "12. هل تشعر 'بثقل الجو' أو 'بهجة المكان' فور دخولك لغرفة ما بناءً على طاقة الموجودين؟", a: ["الذكاء العاطفي", "الذكاء المكاني"], c: 0 },
        { q: "13. هل تنجذب لفهم كيف تتحول ضغطات الأزرار إلى أوامر ينفذها الكمبيوتر خلف الشاشة؟", a: ["الذكاء الرقمي", "الذكاء الحركي"], c: 1 }
    ];

    let qi = 0, score = 0, logs = [];

    function startGame() {
        if(!document.getElementById('p-name').value) return alert("أدخل اسم المتقدم أولاً");
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-section').style.display = 'block';
        loadQ();
    }

    function loadQ() {
        const q = quizData[qi];
        document.getElementById('q-text').innerText = q.q;
        const g = document.getElementById('opts-grid'); g.innerHTML = '';
        document.getElementById('nxt').style.display = 'none';
        document.getElementById('mouth').style.width = '30px';
        q.a.forEach((o, i) => {
            const b = document.createElement('button'); b.className = 'option-btn';
            b.innerText = o; b.onclick = () => check(i, b); g.appendChild(b);
        });
    }

    function check(i, b) {
        const c = quizData[qi].c;
        const all = document.querySelectorAll('.option-btn');
        all.forEach(x => x.style.pointerEvents = 'none');
        const mouth = document.getElementById('mouth');

        if(i === c) {
            b.classList.add('correct'); document.getElementById('aud-win').play(); score++;
            mouth.style.width = '50px'; mouth.style.background = '#00ff88';
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
        } else {
            b.classList.add('wrong'); all[c].classList.add('correct'); document.getElementById('aud-lose').play();
            mouth.style.width = '10px'; mouth.style.background = '#ff3333';
        }
        logs.push({ q: quizData[qi].q, a: quizData[qi].a[i], s: i === c ? "متوافق" : "غير متوافق" });
        document.getElementById('nxt').style.display = 'inline-block';
    }

    function nextQ() {
        qi++; if(qi < quizData.length) loadQ(); else finish();
    }

    function finish() {
        document.getElementById('quiz-section').style.display = 'none';
        document.getElementById('score-container').style.display = 'block';
        document.getElementById('f-score').innerText = `${score}/${quizData.length}`;
        document.getElementById('f-info').innerText = "المبدع/ة: " + document.getElementById('p-name').value + " | إشراف الأخصائية صفاء المصري";
        document.getElementById('award').innerText = score >= 11 ? "🏆 وسام العبقرية الاستثنائية 🏆" : "💡 قدرات معرفية متطورة 💡";
        const body = document.getElementById('rep-body');
        logs.forEach(l => body.innerHTML += `<tr style="border-bottom:1px solid #333"><td style="padding:10px">${l.q}</td><td style="padding:10px">${l.a}</td><td style="padding:10px">${l.s}</td></tr>`);
    }
</script>
</body>
</html>

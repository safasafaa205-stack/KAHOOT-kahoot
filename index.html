<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مختبر ذكاءات المستقبل - صفاء المصري</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');

        :root { 
            --deep-blue: #0a2342; --pearl-velvet: #fdfcfb; 
            --royal-gold: #D4AF37; --skin: #ffdbac; --dress: #e91e63;
        }
        
        body { 
            font-family: 'Cairo', sans-serif; margin: 0; min-height: 100vh; 
            display: flex; justify-content: center; align-items: center; 
            background: radial-gradient(circle, #1a1a2e, #020205);
            overflow: hidden; perspective: 1200px;
        }

        /* مسرح الشخصية 3D */
        .character-stage {
            position: absolute; bottom: 40px; right: 3%;
            width: 180px; height: 320px; z-index: 100;
            transform-style: preserve-3d; transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .girl-3d { width: 100%; height: 100%; position: relative; animation: breathe 4s infinite ease-in-out; }
        @keyframes breathe { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        
        .victory { animation: celebration 0.6s infinite; }
        @keyframes celebration { 0%, 100% { transform: translateY(0) scale(1.1); } 50% { transform: translateY(-40px) scale(1.1); } }
        .sadness { transform: rotateX(15deg) translateY(10px); filter: grayscale(0.4); }

        /* تفاصيل الجسد */
        .head { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 65px; height: 65px; background: var(--skin); border-radius: 50%; border: 1.5px solid #444; z-index: 10; }
        .hair { position: absolute; top: -8px; left: 50%; transform: translateX(-50%); width: 75px; height: 45px; background: #3e2723; border-radius: 40px 40px 10px 10px; }
        .body-3d { position: absolute; top: 62px; left: 50%; transform: translateX(-50%); width: 55px; height: 95px; background: var(--dress); border-radius: 15px 15px 40px 40px; box-shadow: inset 0 0 15px rgba(0,0,0,0.2); }
        .arm { position: absolute; top: 70px; width: 12px; height: 65px; background: var(--skin); border-radius: 10px; transition: 0.4s; transform-origin: top; }
        .arm.left { left: 45px; } .arm.right { right: 45px; }
        .leg { position: absolute; bottom: 80px; width: 15px; height: 85px; background: #fdfcfb; border-radius: 8px; border-bottom: 8px solid #222; }
        .leg.left { left: 70px; } .leg.right { right: 70px; }

        /* حركات الأذرع */
        .victory .arm.left { transform: rotate(140deg); }
        .victory .arm.right { transform: rotate(-140deg); }
        .sadness .arm { transform: rotate(10deg); }

        /* واجهة الاختبار */
        #dashboard { 
            background: var(--pearl-velvet); width: 80%; max-width: 800px; padding: 35px; 
            border-radius: 35px; border: 4px solid var(--royal-gold);
            z-index: 10; position: relative; margin-right: 140px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }

        .question-card { font-size: 1.3rem; margin-bottom: 25px; text-align: right; border-right: 8px solid var(--royal-gold); padding: 20px; background: #fff; border-radius: 15px; line-height: 1.6; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .option-btn { padding: 18px; background: #fff; border: 1.5px solid #ddd; border-radius: 15px; cursor: pointer; transition: 0.3s; font-family: 'Cairo'; font-weight: 700; font-size: 1rem; color: #444; }
        .option-btn:hover { border-color: var(--royal-gold); background: #fffcf0; transform: scale(1.02); }
        .correct { background: #2ecc71 !important; color: white !important; border-color: #27ae60 !important; }
        .wrong { background: #e74c3c !important; color: white !important; border-color: #c0392b !important; }

        .btn-royal { background: linear-gradient(145deg, var(--royal-gold), #b8860b); color: white; padding: 15px 45px; border-radius: 30px; border: none; cursor: pointer; font-family: 'Cairo'; font-weight: bold; margin-top: 20px; }

        #quiz-section, #score-section { display: none; }
        
        @media (max-width: 800px) {
            #dashboard { margin-right: 0; width: 95%; padding: 20px; }
            .character-stage { width: 100px; height: 200px; right: 0; bottom: 0; opacity: 0.5; pointer-events: none; }
            .options-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="character-stage" id="stage">
        <div class="girl-3d" id="girl">
            <div class="hair"></div>
            <div class="head">
                <div style="position:absolute; top:30px; left:15px; width:6px; height:6px; background:#333; border-radius:50%;"></div>
                <div style="position:absolute; top:30px; right:15px; width:6px; height:6px; background:#333; border-radius:50%;"></div>
                <div id="mouth" style="position:absolute; top:45px; left:22px; width:20px; height:2px; background:#333; transition: 0.3s;"></div>
            </div>
            <div class="body-3d"></div>
            <div class="arm left"></div> <div class="arm right"></div>
            <div class="leg left"></div> <div class="leg right"></div>
        </div>
    </div>

    <div id="dashboard">
        <div id="start-screen">
            <h1 style="color: var(--deep-blue); margin-bottom: 10px;">مختبر ذكاءات المستقبل</h1>
            <h3 style="color: var(--royal-gold);">بإشراف الأخصائية: صفاء المصري</h3>
            <p style="color: #666; font-weight: bold;">اختبار المواقف التحليلية العليا</p>
            <input type="text" id="p-name" placeholder="أدخل اسم المبدع هنا" style="padding:15px; width:80%; border-radius:12px; border:2px solid #eee; text-align:center; font-family:'Cairo'; margin-bottom: 20px;">
            <br>
            <button class="btn-royal" onclick="begin()">بدء التحليل الشامل ⮕</button>
        </div>

        <div id="quiz-section">
            <div id="q-text" class="question-card"></div>
            <div id="o-grid" class="options-grid"></div>
            <button id="next-btn" class="btn-royal" style="display:none;" onclick="nextQ()">تحليل الموقف التالي ⮕</button>
        </div>

        <div id="score-section">
            <h2 style="color: var(--royal-gold);">تقرير الموهبة النهائي</h2>
            <div id="final-stats"></div>
            <h1 id="score-val" style="font-size: 4rem; color: var(--deep-blue);"></h1>
            <button class="btn-royal" onclick="location.reload()">بدء اختبار جديد</button>
        </div>
    </div>

<script>
    const quizData = [
        { q: "1. عندما تشاهد جهازاً إلكترونياً معطلاً، تجد نفسك تفكر تلقائياً في تسلسل تدفق الكهرباء داخل الدوائر لاكتشاف نقطة الانقطاع منطقياً:", a: ["ذكاء مكاني", "ذكاء منطقي رياضي", "ذكاء تقني حركي", "ذكاء بصري"], c: 1 },
        { q: "2. أثناء حوار جماعي صاخب، تستطيع رصد التغير المفاجئ في نبرة صوت زميلك وتستنتج أنه يشعر بالإهانة رغم ابتسامته:", a: ["ذكاء اجتماعي", "ذكاء عاطفي", "ذكاء لغوي", "ذكاء ذاتي"], c: 0 },
        { q: "3. في رحلة برية، تلاحظ أن تشققات الأرض تتبع نمطاً هندسياً يشبه خلايا النحل، وتتوقع أماكن وجود الرطوبة بناءً على ميل الصخور:", a: ["ذكاء طبيعي", "ذكاء مكاني", "ذكاء منطقي", "ذكاء وجودي"], c: 0 },
        { q: "4. تستطيع تأليف مقطوعة إيقاعية باستخدام أدوات المطبخ، مدركاً الفوارق الدقيقة في ترددات الأصوات والزمن الفاصل بين النبضات:", a: ["ذكاء موسيقي", "ذكاء حركي", "ذكاء رياضي", "ذكاء لغوي"], c: 0 },
        { q: "5. تختار كلماتك بدقة في الرسائل الصعبة لضمان وصول المعنى المقصود دون أي احتمال للتأويل الخاطئ، مستخدماً استعارات بليغة:", a: ["ذكاء لغوي", "ذكاء اجتماعي", "ذكاء ذاتي", "ذكاء وجودي"], c: 0 },
        { q: "6. حين يصف لك أحدهم طريقاً، تتخيل خريطة ذهنية ثلاثية الأبعاد للمكان وتستطيع 'رؤية' المعالم من زاوية علوية في خيالك:", a: ["ذكاء مكاني", "ذكاء منطقي", "ذكاء طبيعي", "ذكاء حركي"], c: 0 },
        { q: "7. تخصص وقتاً يومياً لمراجعة أهدافك، وتدرك تماماً نقاط ضعفك النفسية وتعرف كيف تتحكم في ردود أفعالك تجاه المستفزين:", a: ["ذكاء ذاتي", "ذكاء اجتماعي", "ذكاء أخلاقي", "ذكاء عاطفي"], c: 0 },
        { q: "8. كثيراً ما تتساءل عن سبب وجود البشر، وما هو دورنا الحقيقي في الكون، وتبحث عن غايات تتجاوز الحياة اليومية المادية:", a: ["ذكاء وجودي", "ذكاء فلسفي", "ذكاء ذاتي", "ذكاء طبيعي"], c: 0 },
        { q: "9. تستمتع بحل الألغاز التي تتطلب ربط معطيات متباعدة للوصول لنتيجة واحدة، مثل استنتاج الجاني في القصص البوليسية المعقدة:", a: ["ذكاء منطقي رياضي", "ذكاء لغوي", "ذكاء بصري", "ذكاء رقمي"], c: 0 },
        { q: "10. ترفض القيام بفعل يحقق ربحاً كبيراً إذا كان يتعارض مع مبادئك، حتى لو لم يراقبك أحد، لإيمانك بمسؤوليتك تجاه الآخرين:", a: ["ذكاء أخلاقي", "ذكاء ذاتي", "ذكاء اجتماعي", "ذكاء وجودي"], c: 0 },
        { q: "11. تمتلك قدرة فائقة على محاكاة حركات رياضية معقدة من المرة الأولى، وتتحكم في توازن جسدك بدقة مذهلة أثناء الحركة:", a: ["ذكاء حركي جسدي", "ذكاء مكاني", "ذكاء طبيعي", "ذكاء ذاتي"], c: 0 },
        { q: "12. عندما تشرح فكرة لزميلك، تبتكر فوراً 'تمثيلاً' أو تجربة عملية لتقريب المفهوم له، مدركاً كيف يستقبل عقله المعلومات:", a: ["ذكاء تعليمي", "ذكاء لغوي", "ذكاء اجتماعي", "ذكاء منطقي"], c: 0 },
        { q: "13. تنجذب لفهم لغات البرمجة والأنظمة الرقمية، وترى العالم كأكواد وبيانات يمكن إعادة هيكلتها لتحسين الكفاءة:", a: ["ذكاء رقمي", "ذكاء منطقي", "ذكاء تقني", "ذكاء بصري"], c: 0 }
    ];

    let qi = 0, score = 0;

    function begin() {
        if(!document.getElementById('p-name').value) return alert("من فضلك اكتب اسمك أولاً!");
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-section').style.display = 'block';
        loadQ();
    }

    function updateCharacter(state) {
        const girl = document.getElementById('girl');
        const mouth = document.getElementById('mouth');
        girl.classList.remove('victory', 'sadness');
        
        if(state === 'happy') {
            girl.classList.add('victory');
            mouth.style.height = "12px"; mouth.style.borderRadius = "0 0 15px 15px";
        } else if(state === 'sad') {
            girl.classList.add('sadness');
            mouth.style.height = "2px"; mouth.style.borderRadius = "50% 50% 0 0";
        } else {
            mouth.style.height = "2px"; mouth.style.borderRadius = "0";
        }
    }

    function loadQ() {
        updateCharacter('idle');
        const q = quizData[qi];
        document.getElementById('q-text').innerText = q.q;
        const g = document.getElementById('o-grid'); g.innerHTML = '';
        document.getElementById('next-btn').style.display = 'none';

        q.a.forEach((opt, i) => {
            const b = document.createElement('button');
            b.className = 'option-btn'; b.innerText = opt;
            b.onclick = () => check(i, b); g.appendChild(b);
        });
    }

    function check(idx, b) {
        const correct = quizData[qi].c;
        const btns = document.querySelectorAll('.option-btn');
        btns.forEach(btn => btn.style.pointerEvents = 'none');

        if(idx === correct) {
            b.classList.add('correct'); score++;
            updateCharacter('happy');
            confetti({ particleCount: 120, spread: 70, origin: { y: 0.7 } });
        } else {
            if(b) b.classList.add('wrong');
            btns[correct].classList.add('correct');
            updateCharacter('sad');
        }
        document.getElementById('next-btn').style.display = 'inline-block';
    }

    function nextQ() {
        qi++; if(qi < quizData.length) loadQ(); else finish();
    }

    function finish() {
        document.getElementById('quiz-section').style.display = 'none';
        document.getElementById('score-section').style.display = 'block';
        document.getElementById('score-val').innerText = `${score} / 13`;
        document.getElementById('final-stats').innerHTML = `<p>المبدع: ${document.getElementById('p-name').value}</p>`;
        updateCharacter(score > 7 ? 'happy' : 'idle');
    }
</script>
</body>
</html>

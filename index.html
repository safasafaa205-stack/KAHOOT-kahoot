<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مقياس الموهبة - صفاء المصري</title>
    <script src="https://cdnjs.cloudflare.com"></script>
    <style>
        :root { --blue: #003366; --ice: #00d2ff; --gold: #D4AF37; --glow: rgba(212, 175, 55, 0.4); }
        body { font-family: 'Cairo', sans-serif; margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle, #001f3f, #000); overflow: hidden; position: relative; }

        /* الأشعة الذهبية */
        body::before { content: ""; position: absolute; width: 200%; height: 200%; background: conic-gradient(from 0deg at 50% 50%, transparent 0deg, var(--glow) 15deg, transparent 30deg); animation: rotate 25s linear infinite; z-index: 0; opacity: 0.4; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* الفتاة والوردة - كامل الجسد */
        .girl-avatar { position: absolute; bottom: 10px; right: 20px; width: 130px; height: 260px; z-index: 5; transition: 0.5s; }
        .head { width: 50px; height: 55px; background: #ffe0bd; border-radius: 50%; margin: 0 auto; border: 2px solid #5d4037; position: relative; }
        .hair { width: 60px; height: 40px; background: #4e342e; position: absolute; top: -10px; left: -5px; border-radius: 30px; }
        .trunk { width: 45px; height: 80px; background: #ff4081; margin: -5px auto; border-radius: 12px; position: relative; }
        .arm { width: 10px; height: 55px; background: #ffe0bd; position: absolute; top: 5px; border-radius: 5px; transition: 0.5s; transform-origin: top; }
        .arm.l { left: -12px; } .arm.r { right: -12px; }
        .leg { width: 13px; height: 70px; background: #333; position: absolute; bottom: -65px; border-radius: 5px; }
        .leg.l { left: 6px; } .leg.r { right: 6px; }
        .rose { position: absolute; top: 35px; right: -25px; font-size: 35px; }
        .mouth { width: 20px; height: 8px; border-bottom: 2px solid #d32f2f; border-radius: 50%; position: absolute; bottom: 12px; left: 15px; transition: 0.3s; }

        /* الواجهة الزرقاء الباردة */
        #dashboard { background: rgba(0, 51, 102, 0.4); backdrop-filter: blur(20px); width: 92%; max-width: 900px; padding: 45px; border-radius: 40px; border: 2px solid var(--gold); text-align: center; z-index: 10; box-shadow: 0 0 40px var(--ice); position: relative; }
        .question-card { font-size: 1.5rem; margin-bottom: 35px; line-height: 1.8; text-align: right; border-right: 12px solid var(--gold); padding-right: 25px; color: #fff; background: rgba(0,0,0,0.3); padding: 25px; border-radius: 15px; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .option-btn { padding: 22px; background: rgba(255,255,255,0.05); border: 1px solid var(--ice); border-radius: 20px; cursor: pointer; transition: 0.3s; font-weight: bold; color: #fff; font-size: 1.1rem; }
        .option-btn:hover { background: var(--ice); color: #000; transform: scale(1.05); }

        .btn-royal { background: var(--gold); color: #000; padding: 15px 60px; border-radius: 50px; border: none; font-size: 1.3rem; font-weight: bold; cursor: pointer; margin-top: 30px; }
        @media print { .no-print, .girl-avatar { display: none !important; } body { background: white; color: black; } #dashboard { border: 2px solid #000; color: black !important; } }
        #quiz-section, #score-section { display: none; }
    </style>
</head>
<body>

    <div class="girl-avatar no-print" id="girl">
        <div class="head"><div class="hair"></div><div style="left:12px;" class="eye"></div><div style="right:12px;" class="eye"></div><div class="mouth" id="mouth"></div></div>
        <div class="trunk"><div class="arm l" id="armL"></div><div class="arm r" id="armR"><div class="rose">🌹</div></div><div class="leg l"></div><div class="leg r"></div></div>
    </div>

    <div id="dashboard">
        <div id="start-screen">
            <h1 style="color: var(--ice);">مختبر الموهبة والإبداع 🔬</h1>
            <h3 style="color: var(--gold);">بإشراف الأخصائية: صفاء المصري</h3>
            <p>تحليل القدرات العقلية والأنماط المعرفية العليا</p>
            <input type="text" id="p-name" placeholder="اسم المبدع المتقدم" style="padding:15px; width:70%; border-radius:12px; border:none; margin:10px; text-align:center;"><br>
            <input type="text" id="p-class" placeholder="المستوى الدراسي" style="padding:15px; width:70%; border-radius:12px; border:none; margin:10px; text-align:center;"><br>
            <button class="btn-royal" onclick="begin()">بدء التحليل الفائق ⮕</button>
        </div>

        <div id="quiz-section">
            <div id="q-box" class="question-card"></div>
            <div id="o-grid" class="options-grid"></div>
            <button id="nxt" class="btn-royal" style="display:none;" onclick="nextStep()">تحليل الموقف التالي</button>
        </div>

        <div id="score-section">
            <h2 style="color: var(--gold);">تقرير التميز المعرفي المعتمد</h2>
            <div id="summary" style="margin-bottom:20px; font-weight:bold;"></div>
            <h1 id="score-text" style="font-size: 4rem; color: var(--ice);"></h1>
            <table style="width:100%; text-align:right; border-collapse: collapse; margin-top:20px; background:rgba(0,0,0,0.3);"><tbody id="log"></tbody></table>
            <div class="no-print">
                <button class="btn-royal" onclick="window.print()">طباعة السجل 🖨️</button>
                <button class="btn-royal" onclick="adminReset()" style="background:#444; color:#fff; margin-right:15px;">محاولة جديدة 🔑</button>
            </div>
        </div>
    </div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playBeep(f) {
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.type = 'sine'; o.frequency.value = f; g.gain.setValueAtTime(0.1, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
        o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.4);
    }

    const quizData = [
        { q: "1. عندما يُعرض عليك تصميم هندسي معقد، تنجذب لاكتشاف 'الفجوات' المنطقية في الهيكل بدلاً من الانبهار بجماله:", a: ["تحليل حركي/تقني", "استنتاج منطقي"], c: 1 },
        { q: "2. تستطيع التنبؤ برد فعل شخص ما تجاه خبر معين بناءً على ربطك لمواقفه المتناقضة في الماضي:", a: ["ذكاء اجتماعي/تحليلي", "ذكاء ذاتي"], c: 0 },
        { q: "3. تلاحظ أنماط النمو المتكررة في الطبيعة وتستطيع استنباط معادلة رياضية تفسر هذا التوازن البيئي:", a: ["ذكاء طبيعي/رياضي", "ذكاء بصري"], c: 0 },
        { q: "4. تدرك الإيقاعات غير المتوقعة في محيطك وتستطيع توظيف 'الصمت' بين الأصوات لخلق معنى تعبيري:", a: ["ذكاء موسيقي", "ذكاء حركي"], c: 0 },
        { q: "5. تستخدم الاستعارات الفلسفية لوصف مفاهيم 'مجردة' لا يدركها الآخرون إلا باللمس أو الرؤية المباشرة:", a: ["ذكاء لغوي/فلسفي", "ذكاء اجتماعي"], c: 0 },
        { q: "6. تستطيع 'تدوير' مجسمات معقدة في مخيلتك وتوقع شكل ظلالها قبل سقوط الضوء عليها فعلياً:", a: ["ذكاء مكاني/بصري", "ذكاء منطقي"], c: 0 },
        { q: "7. تمارس النقد المعرفي لقراراتك وتضع استراتيجيات لتحسين وعيك بناءً على مبادئك الأخلاقية الصارمة:", a: ["ذكاء ذاتي/تأملي", "ذكاء وجودي"], c: 0 },
        { q: "8. تشعر بـ 'قلق معرفي' تجاه قضايا الوجود الكبرى وتبحث عن غايات الأشياء البعيدة عن المحسوسات:", a: ["ذكاء وجودي", "ذكاء طبيعي"], c: 0 },
        { q: "9. تستطيع إيجاد 'الخيط المفقود' بين مجموعة بيانات تبدو عشوائية تماماً للآخرين:", a: ["ذكاء منطقي/استقرائي", "ذكاء لغوي"], c: 0 },
        { q: "10. ترفض الانصياع لسلوك جماعي مبرر اجتماعياً لأنك تمتلك 'بوصلة قيمية' مستقلة تماماً:", a: ["ذكاء أخلاقي/قيمي", "ذكاء اجتماعي"], c: 0 },
        { q: "11. تبتكر وسائل تمثيلية مبتكرة لتبسيط فكرة علمية صعبة لزملائك باستخدام المحاكاة الجسدية:", a: ["ذكاء تعليمي/حركي", "ذكاء بصري"], c: 0 },
        { q: "12. تدرك الحالة المزاجية لمن حولك بمجرد دخولك المكان من خلال تحليل 'الصمت' وحركة العيون:", a: ["ذكاء عاطفي/وجداني", "ذكاء مكاني"], c: 0 },
        { q: "13. تنجذب لفهم 'خوارزميات' التفكير الرقمي وكيفية تدفق البيانات خلف واجهات المستخدم:", a: ["ذكاء رقمي/برمجي", "ذكاء منطقي"], c: 0 }
    ];

    let qi = 0, score = 0, logs = [];

    function begin() {
        playBeep(440);
        if(!document.getElementById('p-name').value) return alert("أدخلي اسم المتحدي");
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-section').style.display = 'block';
        loadQ();
    }

    function loadQ() {
        const q = quizData[qi];
        document.getElementById('q-box').innerText = q.q;
        const g = document.getElementById('o-grid'); g.innerHTML = '';
        document.getElementById('nxt').style.display = 'none';
        
        document.getElementById('mouth').style.borderBottom = '2px solid #d32f2f';
        document.getElementById('armL').style.transform = 'rotate(0deg)';
        document.getElementById('armR').style.transform = 'rotate(0deg)';

        q.a.forEach((opt, i) => {
            const b = document.createElement('button'); b.className = 'option-btn';
            b.innerText = opt; b.onclick = () => { playBeep(600); check(i, b); }; g.appendChild(b);
        });
    }

    function check(i, b) {
        const c = quizData[qi].c;
        const btns = document.querySelectorAll('.option-btn');
        btns.forEach(btn => btn.style.pointerEvents = 'none');
        const m = document.getElementById('mouth');
        const al = document.getElementById('armL'); const ar = document.getElementById('armR');

        if(i === c) {
            b.style.background = 'rgba(39, 174, 96, 0.4)'; playBeep(880); score++;
            m.style.height = '12px'; m.style.borderRadius = '0 0 12px 12px'; 
            al.style.transform = 'rotate(-140deg)'; ar.style.transform = 'rotate(140deg)';
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
        } else {
            b.style.background = 'rgba(198, 40, 40, 0.4)'; playBeep(200);
            m.style.height = '2px'; m.style.borderBottom = '2px solid #000';
        }
        logs.push({ q: quizData[qi].q, a: quizData[qi].a[i], s: i === c ? "متوافق" : "غير متوافق" });
        document.getElementById('nxt').style.display = 'inline-block';
    }

    function nextStep() {
        qi++; if(qi < quizData.length) loadQ(); else finish();
    }

    function finish() {
        document.getElementById('quiz-section').style.display = 'none';
        document.getElementById('score-section').style.display = 'block';
        document.getElementById('score-text').innerText = `${score}/13`;
        document.getElementById('summary').innerText = `المبدع/ة: ${document.getElementById('p-name').value} | إشراف صفاء المصري`;
        const body = document.getElementById('log');
        logs.forEach(l => body.innerHTML += `<tr style="border-bottom:1px solid #444"><td style="padding:10px; font-size:0.85rem;">${l.q}</td><td style="padding:10px">${l.a}</td><td style="padding:10px">${l.s}</td></tr>`);
    }

    function adminReset() {
        if(prompt("رمز الأخصائية صفاء:") === "1234") location.reload();
    }
</script>
</body>
</html>

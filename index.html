<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي جاردنر الملكي المطور</title>
    <style>
        :root { --royal-burgundy: #800020; --royal-gold: #D4AF37; --royal-turquoise: #008080; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(-45deg, #800020, #008080, #2c3e50, #D4AF37); background-size: 400% 400%; animation: gradientBG 15s ease infinite; overflow-x: hidden; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        #game-container { background: rgba(255, 255, 255, 0.96); width: 95%; max-width: 800px; padding: 35px; border-radius: 30px; border: 4px double var(--royal-gold); text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.4); position: relative; max-height: 90vh; overflow-y: auto; }

        /* الأفاتار الذكي المتحرك */
        .ai-avatar { font-size: 65px; display: inline-block; animation: hoverEffect 3s ease-in-out infinite; margin-bottom: 15px; }
        @keyframes hoverEffect { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-15px) rotate(5deg); } }

        .question-box { font-size: 1.35rem; margin: 25px 0; color: #2c3e50; font-weight: 700; padding: 25px; background: #f4f7f6; border-radius: 20px; border-right: 10px solid var(--royal-gold); text-align: right; line-height: 1.6; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .option-btn { padding: 18px; border: 2px solid #ddd; border-radius: 15px; background: white; cursor: pointer; font-weight: 600; transition: 0.3s; font-size: 1rem; font-family: inherit; }
        .option-btn:hover { border-color: var(--royal-gold); background: #fffdf5; transform: translateY(-3px); }
        .correct { background: #27ae60 !important; color: white !important; border-color: #27ae60; }
        .wrong { background: #e74c3c !important; color: white !important; border-color: #e74c3c; }
        
        .btn-action { background: var(--royal-burgundy); color: white; padding: 15px 45px; border: none; border-radius: 50px; font-size: 1.2rem; cursor: pointer; font-weight: bold; margin-top: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        
        #report-table { width: 100%; border-collapse: collapse; margin-top: 25px; text-align: right; }
        #report-table th, #report-table td { border: 1px solid #ddd; padding: 12px; }
        #report-table th { background: var(--royal-burgundy); color: white; }

        @media print { .no-print, .btn-action, .ai-avatar { display: none !important; } body { background: white; } #game-container { border: 1px solid #000; width: 100%; box-shadow: none; margin: 0; padding: 10px; } }
        #quiz-section, #score-container { display: none; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ai-face" class="ai-avatar">🤖</div>

    <div id="start-screen">
        <h1 style="color: var(--royal-burgundy);">🏆 تحدي الذكاءات الـ 13 الملكي</h1>
        <p style="font-weight: bold; color: #555;">اكتشف مكامن عبقريتك في النسخة الأكثر شمولاً</p>
        <input type="text" id="student-name" placeholder="اسم المتقدم للمسابقة" style="padding:15px; width:80%; border-radius:15px; border:2px solid gold; margin-bottom:12px; text-align: center;"><br>
        <input type="text" id="student-class" placeholder="الصف الدراسي" style="padding:15px; width:80%; border-radius:15px; border:2px solid gold; text-align: center;"><br>
        <button class="btn-action" onclick="startQuiz()">ابدأ الرحلة الملكية ⮕</button>
    </div>

    <div id="quiz-section">
        <div id="ai-status" style="font-weight:bold; color:var(--royal-turquoise); margin-bottom:10px;">أنا أحلل قدراتك الآن.. ركز!</div>
        <div id="question" class="question-box"></div>
        <div id="options" class="options-grid"></div>
        <button id="next-btn" class="btn-action" style="display:none;" onclick="loadNextQuestion()">السؤال التالي ⮕</button>
    </div>

    <div id="score-container">
        <h1>✨ سجل العبقرية الملكي ✨</h1>
        <div id="final-info" style="font-size: 1.2rem; font-weight: bold; margin-bottom: 15px;"></div>
        <h1 id="final-score" style="font-size: 3.5rem; color: var(--royal-burgundy); margin: 10px 0;"></h1>
        <div id="award-medal" style="margin-bottom: 20px;"></div>
        
        <table id="report-table">
            <thead><tr><th>السؤال</th><th>إجابتك</th><th>النتيجة</th></tr></thead>
            <tbody id="report-body"></tbody>
        </table>

        <div class="no-print">
            <button class="btn-action" onclick="window.print()" style="background:var(--royal-turquoise)">طباعة السجل والوسام 🖨️</button>
            <button class="btn-action" onclick="location.reload()" style="background:#7f8c8d; margin-right:10px;">إعادة</button>
        </div>
    </div>
</div>

<!-- أصوات مستقرة -->
<audio id="s-correct" src="https://www.soundjay.com"></audio>
<audio id="s-wrong" src="https://www.soundjay.com"></audio>

<script>
    const quizData = [
        { q: "1. تفضل تفكيك الأجهزة القديمة لفهم كيفية عملها وتستمتع بالألعاب الحركية التي تتطلب مهارة يدوية:", options: ["الذكاء المكاني", "الذكاء الحركي", "الذكاء المنطقي", "الذكاء الطبيعي"], correct: 1 },
        { q: "2. لديك قدرة عالية على قراءة مشاعر الآخرين وفهم دوافعهم غير المعلنة بسهولة:", options: ["الذكاء الذاتي", "الذكاء الاجتماعي", "الذكاء الوجودي", "الذكاء اللغوي"], correct: 1 },
        { q: "3. تستمتع بتصنيف الأشياء في الطبيعة (كالصخور أو النباتات) بناءً على أنماطها العلمية:", options: ["الذكاء المنطقي", "الذكاء البصري", "الذكاء الطبيعي", "الذكاء الوجودي"], correct: 2 },
        { q: "4. تدرك التغيرات الطفيفة في نغمات الأصوات وتستطيع حفظ الألحان بسرعة مذهلة:", options: ["الذكاء الموسيقي", "الذكاء المنطقي", "الذكاء الذاتي", "الذكاء اللغوي"], correct: 0 },
        { q: "5. تستخدم الكلمات بدقة وبلاغة لتوصيل مفاهيم معقدة وتستمتع بالألعاب اللغوية:", options: ["الذكاء الاجتماعي", "الذكاء اللغوي", "الذكاء الوجودي", "الذكاء البصري"], correct: 1 },
        { q: "6. تستطيع تخيل الأجسام ثلاثية الأبعاد في عقلك وتدويرها بسهولة قبل رسمها أو صنعها:", options: ["الذكاء المنطقي", "الذكاء البصري المكاني", "الذكاء الحركي", "الذكاء الطبيعي"], correct: 1 },
        { q: "7. تمتلك وعياً عميقاً بنقاط قوتك وضعفك وتعرف تماماً كيف تدير مشاعرك لتحقيق أهدافك:", options: ["الذكاء الاجتماعي", "الذكاء الذاتي", "الذكاء الوجودي", "الذكاء المنطقي"], correct: 1 },
        { q: "8. كثيراً ما تتساءل عن معنى الحياة، الموت، والكون، والأسباب العميقة لوجودنا:", options: ["الذكاء الطبيعي", "الذكاء الوجودي", "الذكاء الذاتي", "الذكاء الاجتماعي"], correct: 1 },
        { q: "9. تستمتع بحل الألغاز المعقدة والتعامل مع الأرقام والأنماط الهندسية المجردة:", options: ["الذكاء المنطقي الرياضي", "الذكاء البصري", "الذكاء اللغوي", "الذكاء الحركي"], correct: 0 },
        { q: "10. القدرة على اتخاذ قرارات أخلاقية مبنية على قيم عميقة ومبادئ ثابتة (الذكاء الأخلاقي):", options: ["الذكاء الاجتماعي", "الذكاء الوجودي", "الذكاء الأخلاقي/الذاتي", "الذكاء الطبيعي"], correct: 2 },
        { q: "11. القدرة على تعليم الآخرين وتبسيط المعلومات المعقدة ببراعة (الذكاء التعليمي):", options: ["الذكاء اللغوي", "الذكاء التعليمي/الاجتماعي", "الذكاء الذاتي", "الذكاء الموسيقي"], correct: 1 },
        { q: "12. الحساسية العالية تجاه الحالة النفسية للآخرين والاستجابة لها بتعاطف (الذكاء العاطفي):", options: ["الذكاء الاجتماعي", "الذكاء العاطفي/الذاتي", "الذكاء الوجودي", "الذكاء اللغوي"], correct: 1 },
        { q: "13. القدرة على إدراك الأنماط الرقمية والتنبؤ بالنتائج في الأنظمة المعقدة (الذكاء الرقمي/التقني):", options: ["الذكاء المنطقي", "الذكاء الرقمي", "الذكاء البصري", "الذكاء الحركي"], correct: 1 }
    ];

    let currentIdx = 0, score = 0, userAnswers = [];
    const aiFace = document.getElementById('ai-face');

    function startQuiz() {
        const name = document.getElementById('student-name').value;
        const sClass = document.getElementById('student-class').value;
        if(!name || !sClass) return alert("فضلاً، أدخل اسمك وصفك لنبدأ التحدي الملكي!");
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-section').style.display = 'block';
        loadQuestion();
    }

    function loadQuestion() {
        const current = quizData[currentIdx];
        document.getElementById('question').innerText = current.q;
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        document.getElementById('next-btn').style.display = 'none';
        aiFace.innerText = "🤖";
        
        current.options.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(idx, btn);
            optionsDiv.appendChild(btn);
        });
    }

    function checkAnswer(idx, btn) {
        const correct = quizData[currentIdx].correct;
        const allBtns = document.querySelectorAll('.option-btn');
        allBtns.forEach(b => b.style.pointerEvents = 'none');

        if(idx === correct) {
            btn.classList.add('correct');
            document.getElementById('s-correct').play();
            score++;
            aiFace.innerText = "😎";
            document.getElementById('ai-status').innerText = "عبقري! إجابة دقيقة جداً.";
        } else {
            btn.classList.add('wrong');
            allBtns[correct].classList.add('correct');
            document.getElementById('s-wrong').play();
            aiFace.innerText = "🧐";
            document.getElementById('ai-status').innerText = "لا بأس، العباقرة يتعلمون من أخطائهم.";
        }

        userAnswers.push({ q: quizData[currentIdx].q, a: quizData[currentIdx].options[idx] || "انتهى الوقت", s: idx === correct ? "✅ صحيحة" : "❌ خاطئة" });
        document.getElementById('next-btn').style.display = 'inline-block';
    }

    function loadNextQuestion() {
        currentIdx++;
        if(currentIdx < quizData.length) loadQuestion();
        else showFinal();
    }

    function showFinal() {
        document.getElementById('quiz-section').style.display = 'none';
        document.getElementById('score-container').style.display = 'block';
        document.getElementById('final-score').innerText = `${score} / ${quizData.length}`;
        document.getElementById('final-info').innerText = `المتسابق: ${document.getElementById('student-name').value} | الصف: ${document.getElementById('student-class').value}`;
        
        if(score >= 11) {
            document.getElementById('award-medal').innerHTML = '<img src="https://cdn-icons-png.flaticon.com" width="120" class="no-print"><h2 style="color:gold;">🌟 وسام العبقرية الشاملة 🌟</h2>';
            aiFace.innerText = "👑";
        } else {
            aiFace.innerText = "👏";
        }
        
        const tbody = document.getElementById('report-body');
        userAnswers.forEach(ans => {
            tbody.innerHTML += `<tr><td>${ans.q}</td><td>${ans.a}</td><td>${ans.s}</td></tr>`;
        });
    }
</script>
</body>
</html>

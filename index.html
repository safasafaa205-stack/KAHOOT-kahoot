<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مختبر الإبداع - صفاء المصري</title>
    <script src="https://cdnjs.cloudflare.com"></script>
    <style>
        :root { --gold: #D4AF37; --cyan: #00f2ff; --royal: #4a0e0e; }
        
        body { 
            font-family: 'Cairo', sans-serif; 
            margin: 0; padding: 0; 
            min-height: 100vh; 
            background: radial-gradient(circle at center, #1a1a1a, #000); 
            display: flex; justify-content: center; align-items: center; 
            overflow: hidden; 
        }

        /* الأفاتار الذي يمشي خارج الإطار */
        .avatar-walker {
            position: absolute;
            width: 120px; height: 180px;
            z-index: 1; /* خلف الواجهة وأمام الخلفية */
            animation: walkAround 20s linear infinite;
            display: flex; flex-direction: column; align-items: center;
        }

        @keyframes walkAround {
            0% { left: -150px; top: 20%; transform: scaleX(1); }
            45% { left: 110%; top: 20%; transform: scaleX(1); }
            50% { left: 110%; top: 70%; transform: scaleX(-1); }
            95% { left: -150px; top: 70%; transform: scaleX(-1); }
            100% { left: -150px; top: 20%; transform: scaleX(1); }
        }

        .bot-body { 
            width: 80px; height: 100px; 
            background: linear-gradient(to bottom, #444, #222); 
            border-radius: 20px; border: 2px solid var(--cyan); 
            box-shadow: 0 0 20px var(--cyan); position: relative;
        }
        .bot-eye { 
            width: 15px; height: 15px; background: #fff; border-radius: 50%; 
            position: absolute; top: 25px; box-shadow: 0 0 10px #fff;
            animation: pulseEye 1s infinite alternate;
        }
        @keyframes pulseEye { from { opacity: 0.5; } to { opacity: 1; } }
        .bot-eye.l { left: 15px; } .bot-eye.r { right: 15px; }
        
        /* الواجهة الكبيرة والجميلة */
        #game-container { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(25px); 
            width: 90%; max-width: 950px; /* تكبير الواجهة */
            min-height: 600px;
            padding: 50px; 
            border-radius: 40px; 
            border: 1px solid rgba(212, 175, 55, 0.4); 
            text-align: center; 
            z-index: 10; /* فوق الأفاتار */
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            position: relative;
        }

        .question-box { 
            font-size: 1.8rem; /* خط أكبر */
            margin-bottom: 40px; padding: 40px; 
            background: rgba(0,0,0,0.6); 
            border-radius: 25px; border-right: 12px solid var(--gold); 
            text-align: right; line-height: 1.8;
        }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        
        .option-btn { 
            padding: 25px; font-size: 1.2rem; 
            background: rgba(255,255,255,0.08); color: #fff; 
            border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; 
            cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        .option-btn:hover { background: var(--gold); color: #000; transform: translateY(-10px) scale(1.05); }

        .btn-action { 
            background: var(--cyan); color: #000; 
            padding: 20px 60px; border-radius: 50px; 
            font-size: 1.3rem; font-weight: bold; border: none; cursor: pointer; 
            margin-top: 40px; transition: 0.3s;
        }
        .btn-action:hover { box-shadow: 0 0 30px var(--cyan); transform: scale(1.1); }

        #score-container h1 { font-size: 5rem; margin: 20px 0; }
        
        @media print { .no-print, .avatar-walker { display: none !important; } }
        #quiz-section, #score-container { display: none; }
    </style>
</head>
<body>

    <!-- الأفاتار الطليق خارج الواجهة -->
    <div class="avatar-walker no-print" id="main-bot">
        <div class="bot-body">
            <div class="bot-eye l"></div><div class="bot-eye r"></div>
            <div style="width:30px; height:4px; background:var(--cyan); margin:45px auto; border-radius:2px;"></div>
        </div>
        <div style="color:var(--cyan); font-weight:bold; margin-top:10px; font-size:12px; background:rgba(0,0,0,0.5); padding:2px 8px; border-radius:10px;">AI Assistant</div>
    </div>

    <div id="game-container">
        <!-- شاشة البداية -->
        <div id="start-screen">
            <h1 style="color: var(--gold); font-size: 3rem; margin-bottom: 10px;">مختبر الذكاءات المتعددة</h1>
            <h2 style="color: #fff; margin-top: 0;">بإشراف الأخصائية: صفاء المصري</h2>
            <p style="color: #ccc; font-size: 1.2rem;">نظام تحليل الموهبة والإبداع المتطور</p>
            <div style="margin-top: 40px;">
                <input type="text" id="p-name" placeholder="اسم المبدع/ة المتقدم/ة" style="padding:20px; width:60%; border-radius:15px; border:none; margin-bottom:15px; font-size:1.1rem; text-align:center;"><br>
                <input type="text" id="p-class" placeholder="الصف الدراسي" style="padding:20px; width:60%; border-radius:15px; border:none; font-size:1.1rem; text-align:center;"><br>
                <button class="btn-action" onclick="startGame()">تحليل النظام الذهني ⮕</button>
            </div>
        </div>

        <!-- قسم الأسئلة -->
        <div id="quiz-section">
            <div id="q-text" class="question-box"></div>
            <div id="opts-grid" class="options-grid"></div>
            <button id="nxt" class="btn-action" style="display:none;" onclick="nextQ()">الانتقال للمرحلة التالية</button>
        </div>

        <!-- قسم النتائج -->
        <div id="score-container">
            <h2 style="color: var(--gold); font-size: 2rem;">تقرير تحليل الموهبة النهائي</h2>
            <h1 id="f-score"></h1>
            <div id="award" style="font-size: 1.5rem; margin-bottom: 30px;"></div>
            <table id="rep" style="width:100%; text-align: right; color: #fff; background: rgba(0,0,0,0.3); border-collapse: collapse;">
                <tbody id="rep-body"></tbody>
            </table>
            <div class="no-print" style="margin-top: 40px;">
                <button class="btn-action" onclick="window.print()" style="background:var(--gold)">طباعة السجل 🖨️</button>
                <button class="btn-action" onclick="location.reload()" style="background:#444; color:#fff; margin-right:20px;">إعادة التحليل</button>
            </div>
        </div>
    </div>

<audio id="aud-win" src="https://www.soundjay.com"></audio>
<audio id="aud-lose" src="https://www.soundjay.com"></audio>

<script>
    const quizData = [
        { q: "1. تفضل تفكيك الأنظمة المعقدة لاكتشاف منطق عملها الداخلي بدلاً من مجرد تشغيلها:", a: ["نمط حركي/تقني", "نمط منطقي"], c: 0 },
        { q: "2. تستطيع التنبؤ بردود فعل الآخرين بناءً على ملاحظة تعابير وجوههم العفوية:", a: ["تحليل اجتماعي", "وعي ذاتي"], c: 0 },
        { q: "3. تلاحظ أنماط النمو المتشابهة في الطبيعة وتربطها بقوانين كونية موحدة:", a: ["استنتاج طبيعي", "إدراك بصري"], c: 0 },
        { q: "4. تدرك الإيقاعات غير المنتظمة في الأصوات المحيطة وتستطيع توظيفها تعبيرياً:", a: ["ذكاء موسيقي", "ذكاء حركي"], c: 0 },
        { q: "5. تستخدم الاستعارات اللغوية لوصف مفاهيم فلسفية مجردة لا تُشرح مباشرة:", a: ["ذكاء لغوي", "ذكاء اجتماعي"], c: 0 },
        { q: "6. تبني خرائط ذهنية معقدة للأماكن وتحدد الاتجاهات بدقة دون الحاجة لوسائل مساعدة:", a: ["ذكاء مكاني", "ذكاء منطقي"], c: 0 },
        { q: "7. تمارس النقد الذاتي لقراراتك وتضع خططاً لتطوير وعيك الشخصي بناءً على التجارب:", a: ["ذكاء ذاتي", "ذكاء وجودي"], c: 0 },
        { q: "8. تشغل بالك القضايا الوجودية الكبرى وتبحث عن غايات الأشياء البعيدة:", a: ["ذكاء وجودي", "ذكاء طبيعي"], c: 0 },
        { q: "9. تستنبط علاقات منطقية مخفية بين مجموعة بيانات تبدو عشوائية للآخرين:", a: ["منطقي رياضي", "تقني رقمي"], c: 0 },
        { q: "10. تمتلك بوصلة قيمية مستقلة ترفض اتباع السلوك الجماعي إذا تعارض مع مبادئك:", a: ["ذكاء أخلاقي", "ذكاء اجتماعي"], c: 0 },
        { q: "11. تبتكر استراتيجيات تعليمية غير تقليدية لتبسيط الأفكار العلمية لزملائك:", a: ["ذكاء تعليمي", "ذكاء لغوي"], c: 0 },
        { q: "12. تدرك الحالة الوجدانية للمحيطين بك بمجرد تواجدك في حيزهم المكاني:", a: ["ذكاء عاطفي", "ذكاء مكاني"], c: 0 },
        { q: "13. تنجذب لفهم الخوارزميات وتدفق البيانات التي تدير الأنظمة الرقمية:", a: ["ذكاء رقمي", "ذكاء منطقي"], c: 0 }
    ];

    let qi = 0, score = 0, logs = [];

    function startGame() {
        if(!document.getElementById('p-name').value) return alert("أدخل اسم المبدع أولاً");
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-section').style.display = 'block';
        loadQ();
    }

    function loadQ() {
        const q = quizData[qi];
        document.getElementById('q-text').innerText = q.q;
        const g = document.getElementById('opts-grid'); g.innerHTML = '';
        document.getElementById('nxt').style.display = 'none';
        q.a.forEach((o, i) => {
            const b = document.createElement('button'); b.className = 'option-btn';
            b.innerText = o; b.onclick = () => check(i, b); g.appendChild(b);
        });
    }

    function check(i, b) {
        const c = quizData[qi].c;
        const all = document.querySelectorAll('.option-btn');
        all.forEach(x => x.style.pointerEvents = 'none');
        
        if(i === c) {
            b.style.background = '#27ae60'; document.getElementById('aud-win').play(); score++;
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        } else {
            b.style.background = '#e74c3c'; all[c].style.background = '#27ae60'; document.getElementById('aud-lose').play();
        }
        logs.push({ q: quizData[qi].q, a: quizData[qi].a[i], s: i === c ? "متوافق" : "غير متوافق" });
        document.getElementById('nxt').style.display = 'inline-block';
    }

    function nextQ() {
        qi++; if(qi < quizData.length) loadQ(); else finish();
    }

    function finish() {
        document.getElementById('quiz-section').style.display = 'none';
        document.getElementById('score-container').style.display = 'block';
        document.getElementById('f-score').innerText = `${score}/${quizData.length}`;
        document.getElementById('f-info').innerText = "المبدع/ة: " + document.getElementById('p-name').value + " | إشراف الأخصائية صفاء المصري";
        document.getElementById('award').innerText = score >= 11 ? "🏆 وسام العبقرية الاستثنائية 🏆" : "💡 قدرات معرفية متطورة 💡";
        const body = document.getElementById('rep-body');
        logs.forEach(l => body.innerHTML += `<tr style="border-bottom:1px solid #555"><td style="padding:15px">${l.q}</td><td style="padding:15px">${l.a}</td><td style="padding:15px">${l.s}</td></tr>`);
    }
</script>
</body>
</html>

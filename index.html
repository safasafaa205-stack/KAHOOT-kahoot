<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مختبر ذكاءات المستقبل - صفاء المصري</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');

        :root { 
            --cool-blue: #0a192f; 
            --pearl-red: #fff5f5; /* لؤلؤي بلمحة حمراء */
            --royal-gold: #D4AF37;
            --sun-glow: rgba(255, 253, 208, 0.3);
            --dress: #d32f2f; /* فستان أحمر لؤلؤي */
        }
        
        body { 
            font-family: 'Cairo', sans-serif; margin: 0; min-height: 100vh; 
            display: flex; justify-content: center; align-items: center; 
            background: linear-gradient(135deg, #0d1b2a, #1b263b);
            overflow: hidden; perspective: 1200px;
        }

        /* أشعة الشمس المتوهجة */
        .sun-rays {
            position: absolute; top: -200px; left: -200px;
            width: 1000px; height: 1000px;
            background: radial-gradient(circle, var(--sun-glow) 0%, transparent 70%);
            filter: blur(50px); animation: sunPulse 8s infinite alternate;
            z-index: 1; pointer-events: none;
        }
        @keyframes sunPulse { from { opacity: 0.3; transform: scale(1); } to { opacity: 0.6; transform: scale(1.2); } }

        /* العناصر الجمالية حول الفتاة (حديقة سحرية) */
        .scenery { position: absolute; bottom: 20px; right: 50px; width: 300px; height: 400px; z-index: 5; }
        .flower { position: absolute; bottom: 0; width: 20px; height: 60px; background: #2d6a4f; border-radius: 10px; }
        .flower::after { content: '🌸'; position: absolute; top: -15px; left: -5px; font-size: 20px; }
        .f1 { right: 40px; height: 80px; } .f2 { right: 220px; height: 50px; }
        .butterfly { position: absolute; font-size: 20px; animation: fly 5s infinite linear; }
        @keyframes fly { 0% { transform: translate(0,0) rotate(0deg); } 50% { transform: translate(-30px, -50px) rotate(20deg); } 100% { transform: translate(0,0) rotate(0deg); } }

        /* شخصية الفتاة 3D */
        .character-stage {
            position: absolute; bottom: 40px; right: 80px;
            width: 180px; height: 320px; transform-style: preserve-3d; transition: 0.6s;
        }
        .girl-3d { width: 100%; height: 100%; position: relative; animation: breathe 4s infinite ease-in-out; }
        @keyframes breathe { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .victory { animation: jump 0.5s infinite alternate; }
        @keyframes jump { from { transform: translateY(0); } to { transform: translateY(-40px); } }
        
        .head { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 65px; height: 65px; background: #ffdbac; border-radius: 50%; border: 1px solid #999; z-index: 10; }
        .hair { position: absolute; top: -5px; width: 75px; height: 50px; background: #3e2723; border-radius: 40px 40px 5px 5px; left: 50%; transform: translateX(-50%); }
        .body-3d { position: absolute; top: 62px; left: 50%; transform: translateX(-50%); width: 55px; height: 100px; background: var(--dress); border-radius: 15px 15px 50px 50px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .arm { position: absolute; top: 70px; width: 12px; height: 70px; background: #ffdbac; border-radius: 10px; transform-origin: top; transition: 0.4s; }
        .arm.left { left: 45px; } .arm.right { right: 45px; }
        .leg { position: absolute; bottom: 70px; width: 16px; height: 90px; background: #fff; border-radius: 5px; border-bottom: 8px solid #222; }
        .leg.left { left: 70px; } .leg.right { right: 70px; }

        /* واجهة الاختبار - لؤلؤي محمر */
        #dashboard { 
            background: var(--pearl-red); width: 85%; max-width: 780px; padding: 40px; 
            border-radius: 50px; border: 6px double #e57373;
            z-index: 10; position: relative; margin-right: 180px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.7), inset 0 0 30px rgba(255,192,192,0.4);
            color: #2c3e50;
        }

        .question-card { 
            font-size: 1.4rem; margin-bottom: 25px; text-align: right; 
            border-right: 12px solid #d32f2f; padding: 25px; 
            background: rgba(255,255,255,0.8); border-radius: 20px; line-height: 1.8;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .option-btn { 
            padding: 18px; background: #fff; border: 2px solid #ffcdd2; 
            border-radius: 20px; cursor: pointer; transition: 0.3s; 
            font-family: 'Cairo'; font-weight: 700; font-size: 1.1rem; color: #5d4037;
        }
        .option-btn:hover { border-color: #d32f2f; background: #ffebee; transform: scale(1.03); }
        
        .correct { background: #4caf50 !important; color: white !important; border-color: #2e7d32 !important; animation: pulse-green 0.5s; }
        .wrong { background: #f44336 !important; color: white !important; border-color: #b71c1c !important; }

        @keyframes pulse-green { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .btn-royal { background: linear-gradient(145deg, #d32f2f, #b71c1c); color: white; padding: 18px 60px; border-radius: 50px; border: none; cursor: pointer; font-family: 'Cairo'; font-weight: bold; margin-top: 30px; font-size: 1.2rem; }

        #quiz-section, #score-section { display: none; }
    </style>
</head>
<body>

    <div class="sun-rays"></div>

    <div class="scenery">
        <div class="flower f1"></div>
        <div class="flower f2"></div>
        <div class="butterfly" style="top:50px; right:100px;">🦋</div>
        <div class="butterfly" style="top:120px; right:250px; animation-delay: 2s;">🦋</div>
        
        <div class="character-stage" id="stage">
            <div class="girl-3d" id="girl">
                <div class="hair"></div>
                <div class="head">
                    <div style="position:absolute; top:32px; left:15px; width:6px; height:6px; background:#222; border-radius:50%;"></div>
                    <div style="position:absolute; top:32px; right:15px; width:6px; height:6px; background:#222; border-radius:50%;"></div>
                    <div id="mouth" style="position:absolute; top:48px; left:22px; width:20px; height:2px; background:#222;"></div>
                </div>
                <div class="body-3d"></div>
                <div class="arm left"></div> <div class="arm right"></div>
                <div class="leg left"></div> <div class="leg right"></div>
            </div>
        </div>
    </div>

    <div id="dashboard">
        <div id="start-screen">
            <h1 style="color: #b71c1c; font-size: 2.8rem; margin: 0;">مختبر التحليل المعرفي</h1>
            <h3 style="color: #5d4037; margin-bottom: 20px;">بإشراف الخبيرة: صفاء المصري</h3>
            <p style="font-weight: bold; color: #888;">نظام قياس الذكاءات عبر المواقف الفلسفية والمشكلات المعقدة</p>
            <input type="text" id="p-name" placeholder="أدخل اسم المبدع المتقدم" style="padding:20px; width:80%; border-radius:15px; border:2px solid #ffcdd2; text-align:center; font-family:'Cairo'; font-size: 1.2rem;"><br>
            <button class="btn-royal" onclick="begin()">دخول الاختبار ⮕</button>
        </div>

        <div id="quiz-section">
            <div id="q-text" class="question-card"></div>
            <div id="o-grid" class="options-grid"></div>
            <button id="next-btn" class="btn-royal" style="display:none;" onclick="nextQ()">تحليل الموقف التالي ⮕</button>
        </div>

        <div id="score-section">
            <h2 style="color: #b71c1c;">تقرير الحالة الإبداعية</h2>
            <h1 id="score-val" style="font-size: 6rem; color: #0d1b2a;"></h1>
            <p id="final-comment" style="font-size: 1.4rem; font-weight: bold;"></p>
            <button class="btn-royal" onclick="location.reload()">محاولة تحليل جديدة</button>
        </div>
    </div>

<script>
    // نظام الصوت المتقدم
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        
        if(type === 'correct') {
            osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
            osc.frequency.exponentialRampToValueAtTime(1046.50, audioCtx.currentTime + 0.1); // C6
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        } else if(type === 'wrong') {
            osc.frequency.setValueAtTime(220, audioCtx.currentTime); // A3
            osc.frequency.linearRampToValueAtTime(110, audioCtx.currentTime + 0.2); // A2
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        } else {
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        }
        osc.start(); osc.stop(audioCtx.currentTime + 0.2);
    }

    const quizData = [
        { q: "1. الموقف الوجودي: عندما تواجه فكرة 'اللانهاية' في الكون، هل تجد نفسك منجذباً لربطها بقوانين رياضية دقيقة أم تميل للتأمل في غاية وجودك كجزء من هذا النظام؟", a: ["تحليل رياضي مجرد", "تأمل وجودي كوني", "إدراك مكاني للأبعاد", "بحث طبيعي حيوي"], c: 1 },
        { q: "2. الموقف التحليلي: إذا أعطيت مجموعة بيانات تبدو عشوائية (أرقام، صور، أصوات)، ما هي أول 'خوارزمية' عقلية تستخدمها لفك شفرتها؟", a: ["البحث عن أنماط لغوية", "تحليل الترددات الصوتية", "استنتاج روابط منطقية", "تخيل هيكل مكاني"], c: 2 },
        { q: "3. الموقف العاطفي-الاجتماعي: في نقاش حاد، هل تستطيع تمييز 'المسافة النفسية' بين ما يقوله الطرف الآخر وبين ما يشعر به حقاً من خلال انقباض عضلات وجهه اللاإرادية؟", a: ["ذكاء اجتماعي خارجي", "ذكاء عاطفي داخلي", "ذكاء لغوي دلالي", "ذكاء ذاتي عميق"], c: 1 },
        { q: "4. الموقف المكاني المعقد: تخيل أنك تقوم بتفكيك محرك افتراضي في ذهنك؛ هل يمكنك تدوير قطعة واحدة دون التأثير على توازن باقي المحرك في مخيلتك؟", a: ["ذكاء حركي دقيق", "ذكاء مكاني ثلاثي", "ذكاء منطقي بنيوي", "ذكاء بصري مسطح"], c: 1 },
        { q: "5. الموقف اللغوي الفلسفي: هل تستخدم الكلمات كأدوات لنقل المعلومات فقط، أم تبني بها 'استعارات' معقدة لشرح مفاهيم غير ملموسة مثل العدالة أو الوقت؟", a: ["ذكاء لغوي إبداعي", "ذكاء منطقي فلسفي", "ذكاء وجودي عميق", "ذكاء اجتماعي تواصلي"], c: 0 },
        { q: "6. الموقف الطبيعي: عند مراقبة غابة، هل ترى 'أشجاراً منفصلة' أم تدرك النظام التكافلي الخفي الذي يربط جذور الأشجار بالفطريات تحت الأرض كشبكة معلومات؟", a: ["ذكاء طبيعي نظمي", "ذكاء بصري تفصيلي", "ذكاء وجودي كلي", "ذكاء منطقي رياضي"], c: 0 },
        { q: "7. الموقف الذاتي: إذا واجهت فشلاً ذريعاً، هل تمتلك القدرة على فصل 'ذاتك' عن 'التجربة' وتحليل الخلل الاستراتيجي في تفكيرك بموضوعية تامة؟", a: ["ذكاء ذاتي تحليلي", "ذكاء عاطفي مرن", "ذكاء أخلاقي قيمي", "ذكاء منطقي بارد"], c: 0 },
        { q: "8. الموقف الموسيقي: هل تستطيع تمييز 'النشاز' في إيقاع الحياة اليومية (مثل صوت محرك أو تنفس) وتوظيفه لخلق نمط صوتي ذو معنى؟", a: ["ذكاء موسيقي إيقاعي", "ذكاء طبيعي سمعي", "ذكاء حركي تفاعلي", "ذكاء منطقي رياضي"], c: 0 },
        { q: "9. الموقف الأخلاقي: إذا كان عليك اتخاذ قرار ينقذ الأغلبية لكنه يظلم فرداً واحداً، هل تستند في حكمك لـ 'مسطرة قيمية' ثابتة لا تتغير بتغير المصالح؟", a: ["ذكاء أخلاقي مبدئي", "ذكاء اجتماعي نفعي", "ذكاء وجودي كلي", "ذكاء ذاتي نفسي"], c: 0 },
        { q: "10. الموقف الحركي: في رياضة جديدة، هل تتعلم الحركات عن طريق 'التلقين' أم يشعر جسدك بمركز الثقل وقوانين الفيزياء ويحاكيها عفوياً؟", a: ["ذكاء حركي فطري", "ذكاء مكاني حركي", "ذكاء بصري تقليدي", "ذكاء منطقي عملي"], c: 0 },
        { q: "11. الموقف التعليمي: حين تفهم مفهوماً صعباً، هل تستطيع إعادة 'هندسته' ذهنياً لتبسيطه لطفل صغير باستخدام أدوات من بيئته المحيطة؟", a: ["ذكاء تعليمي استراتيجي", "ذكاء لغوي تبسيطي", "ذكاء اجتماعي تفاعلي", "ذكاء بصري توضيحي"], c: 0 },
        { q: "12. الموقف الرقمي: هل تدرك كيف تعالج الأنظمة الذكية البيانات خلف الشاشات، وتستطيع توقع 'سلوك الخوارزمية' قبل أن تظهر لك النتائج؟", a: ["ذكاء رقمي تقني", "ذكاء منطقي رياضي", "ذكاء بصري أنظمي", "ذكاء مكاني رقمي"], c: 0 },
        { q: "13. الموقف الكوني: هل تشعر بارتباط عميق بين أصغر ذرة في جسدك وأبعد مجرة في الكون، وتبحث عن القوانين الموحدة التي تجمعهما؟", a: ["ذكاء وجودي شمولي", "ذكاء طبيعي كوني", "ذكاء رياضي نظري", "ذكاء ذاتي روحاني"], c: 0 }
    ];

    let qi = 0, score = 0;

    function begin() {
        if(!document.getElementById('p-name').value) return alert("أهلاً بك.. فضلاً أدخل اسمك للبدء");
        playSound('start');
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-section').style.display = 'block';
        loadQ();
    }

    function updateGirl(state) {
        const girl = document.getElementById('girl');
        const mouth = document.getElementById('mouth');
        const arms = document.querySelectorAll('.arm');
        girl.classList.remove('victory');
        
        if(state === 'happy') {
            girl.classList.add('victory');
            mouth.style.height = "12px"; mouth.style.borderRadius = "0 0 10px 10px";
            arms[0].style.transform = "rotate(150deg)"; arms[1].style.transform = "rotate(-150deg)";
        } else if(state === 'sad') {
            mouth.style.height = "2px"; mouth.style.borderRadius = "50% 50% 0 0";
            arms[0].style.transform = "rotate(20deg)"; arms[1].style.transform = "rotate(-20deg)";
            girl.style.transform = "rotateX(20deg)";
        } else {
            mouth.style.height = "2px"; mouth.style.borderRadius = "0";
            arms[0].style.transform = "rotate(0)"; arms[1].style.transform = "rotate(0)";
            girl.style.transform = "rotateX(0)";
        }
    }

    function loadQ() {
        updateGirl('idle');
        const q = quizData[qi];
        document.getElementById('q-text').innerText = q.q;
        const g = document.getElementById('o-grid'); g.innerHTML = '';
        document.getElementById('next-btn').style.display = 'none';

        q.a.forEach((opt, i) => {
            const b = document.createElement('button');
            b.className = 'option-btn'; b.innerText = opt;
            b.onclick = () => check(i, b); g.appendChild(b);
        });
    }

    function check(idx, b) {
        const correct = quizData[qi].c;
        const btns = document.querySelectorAll('.option-btn');
        btns.forEach(btn => btn.style.pointerEvents = 'none');

        if(idx === correct) {
            b.classList.add('correct'); score++;
            playSound('correct'); updateGirl('happy');
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.7 } });
        } else {
            if(b) b.classList.add('wrong');
            btns[correct].classList.add('correct');
            playSound('wrong'); updateGirl('sad');
        }
        document.getElementById('next-btn').style.display = 'inline-block';
    }

    function nextQ() {
        qi++; if(qi < quizData.length) loadQ(); else finish();
    }

    function finish() {
        document.getElementById('quiz-section').style.display = 'none';
        document.getElementById('score-section').style.display = 'block';
        document.getElementById('score-val').innerText = `${score} / 13`;
        let msg = score > 10 ? "عبقرية تحليلية نادرة!" : (score > 6 ? "ذكاء متزن وقدرات واعدة" : "تحتاج لتطوير مهارات الربط التحليلي");
        document.getElementById('final-comment').innerText = msg;
        updateGirl(score > 7 ? 'happy' : 'idle');
    }
</script>
</body>
</html>

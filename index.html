<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مختبر الإبداع - صفاء المصري</title>
    <script src="https://cdnjs.cloudflare.com"></script>
    <style>
        :root { 
            --deep-blue: #004e92; 
            --pearl-velvet: #f0f0f0; 
            --gold-sun: #FFD700;
            --royal-gold: #D4AF37;
        }
        
        body { 
            font-family: 'Cairo', sans-serif; margin: 0; min-height: 100vh; 
            display: flex; justify-content: center; align-items: center; 
            background: linear-gradient(135deg, #000428, var(--deep-blue));
            overflow: hidden; position: relative;
        }

        /* أشعة الشمس الذهبية */
        .sun-rays {
            position: absolute; top: -100px; right: -100px;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.4) 0%, transparent 70%);
            z-index: 0; animation: sunPulse 5s infinite alternate;
        }
        .ray {
            position: absolute; top: 50%; left: 50%;
            width: 2000px; height: 50px;
            background: linear-gradient(to right, rgba(255, 215, 0, 0.2), transparent);
            transform-origin: left; z-index: 0; opacity: 0.3;
        }

        @keyframes sunPulse { from { opacity: 0.5; } to { opacity: 0.8; } }

        /* الأفاتار البشري الحقيقي */
        .real-avatar {
            position: absolute; bottom: 30px; left: 50px; width: 180px;
            z-index: 5; transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 0 15px var(--gold-sun));
        }
        .real-avatar img { width: 100%; border-radius: 30px; border: 3px solid var(--royal-gold); }

        /* الواجهة اللؤلؤية المخملية */
        #dashboard { 
            background: var(--pearl-velvet);
            background-image: radial-gradient(circle at top left, #fff, #e0e0e0);
            width: 90%; max-width: 900px; padding: 45px; 
            border-radius: 40px; border: 4px double var(--royal-gold);
            text-align: center; z-index: 10;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), inset 0 0 20px #fff;
            position: relative; color: #333;
        }

        .question-card { 
            font-size: 1.6rem; margin-bottom: 30px; line-height: 1.8; text-align: right; 
            border-right: 12px solid var(--royal-gold); padding: 30px; 
            background: #fff; border-radius: 20px; color: #222;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
        }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .option-btn { 
            padding: 22px; background: #fdfdfd; border: 2px solid #ddd; 
            border-radius: 20px; cursor: pointer; transition: 0.3s; 
            font-weight: bold; color: #444; font-size: 1.1rem;
            box-shadow: 0 5px 10px rgba(0,0,0,0.05);
        }
        .option-btn:hover { border-color: var(--royal-gold); background: #fffcf0; transform: translateY(-5px); }
        
        .correct { background: #27ae60 !important; color: #fff !important; border-color: #2ecc71 !important; }
        .wrong { background: #c62828 !important; color: #fff !important; border-color: #e74c3c !important; }

        .btn-royal { 
            background: linear-gradient(to bottom, var(--royal-gold), #b8860b); 
            color: #fff; padding: 18px 70px; border-radius: 50px; 
            border: none; font-size: 1.3rem; font-weight: bold; cursor: pointer; 
            margin-top: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .timer-bar { width: 100%; height: 10px; background: #ddd; border-radius: 10px; margin-bottom: 30px; overflow: hidden; }
        #timer-fill { width: 100%; height: 100%; background: var(--deep-blue); transition: 1s linear; }

        @media print { .no-print, .real-avatar, .sun-rays { display: none !important; } body { background: white; } #dashboard { border: 2px solid #000; box-shadow: none; width: 100%; } }
        #quiz-section, #score-section { display: none; }
    </style>
</head>
<body>

    <!-- أشعة الشمس الذهبية -->
    <div class="sun-rays no-print">
        <div class="ray" style="transform: rotate(150deg);"></div>
        <div class="ray" style="transform: rotate(170deg);"></div>
        <div class="ray" style="transform: rotate(190deg);"></div>
        <div class="ray" style="transform: rotate(210deg);"></div>
    </div>

    <!-- الأفاتار البشري -->
    <div class="real-avatar no-print" id="avatar-box">
        <img src="https://images.unsplash.com" alt="Avatar">
    </div>

    <div id="dashboard">
        <div id="start-screen">
            <h1 style="color: var(--deep-blue); font-size: 2.8rem; margin-bottom: 0;">مختبر الموهبة والإبداع</h1>
            <h3 style="color: var(--royal-gold); margin-top: 5px;">بإشراف الأخصائية: صفاء المصري</h3>
            <p style="font-weight: bold; color: #666;">تحليل المواقف المعرفية والذكاءات الـ 13</p>
            <div style="margin-top: 40px;">
                <input type="text" id="p-name" placeholder="اسم المبدع المتقدم" style="padding:20px; width:70%; border-radius:15px; border:2px solid #ddd; margin:10px; text-align:center; font-size:1.1rem;"><br>
                <input type="text" id="p-class" placeholder="الصف الدراسي" style="padding:20px; width:70%; border-radius:15px; border:2px solid #ddd; margin:10px; text-align:center; font-size:1.1rem;"><br>
                <button class="btn-royal" onclick="begin()">دخول المختبر ⮕</button>
            </div>
        </div>

        <div id="quiz-section">
            <div class="timer-bar"><div id="timer-fill"></div></div>
            <div id="q-text" class="question-card"></div>
            <div id="o-grid" class="options-grid"></div>
            <button id="next-btn" class="btn-royal" onclick="nextQ()">السؤال التالي ⮕</button>
        </div>

        <div id="score-section">
            <h2 style="color: var(--royal-gold);">تقرير الموهبة النهائي المعتمد</h2>
            <div id="final-info" style="margin-bottom:20px; font-weight:bold;"></div>
            <h1 id="score-val" style="font-size: 5rem; color: var(--deep-blue);"></h1>
            <table style="width:100%; text-align:right; border-collapse: collapse; margin-top:20px; background:rgba(0,0,0,0.03);">
                <tbody id="res-log"></tbody>
            </table>
            <div class="no-print">
                <button class="btn-royal" onclick="window.print()">طباعة السجل 🖨️</button>
                <button class="btn-royal" onclick="adminReset()" style="background:#555; margin-right:15px;">محاولة جديدة 🔑</button>
            </div>
        </div>
    </div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playBeep(f) {
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.type = 'sine'; o.frequency.value = f; g.gain.setValueAtTime(0.1, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
        o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.5);
    }

    const quizData = [
        { q: "1. تفضل تفكيك الأجهزة المعقدة لاكتشاف خوارزميات عملها الداخلية بدلاً من مجرد استخدامها:", a: ["نمط حركي", "استنتاج منطقي", "إدراك بصري", "وعي وجودي"], c: 1 },
        { q: "2. تستطيع التنبؤ برد فعل شخص ما تجاه خبر معين بناءً على ربط مواقف متناقضة قام بها في الماضي:", a: ["ذكاء اجتماعي", "ذكاء ذاتي", "ذكاء لغوي", "ذكاء عاطفي"], c: 0 },
        { q: "3. تلاحظ أنماط النمو المتكررة في الطبيعة وتستطيع استنباط معادلة تفسر هذا التوازن البيئي:", a: ["استنتاج طبيعي", "ذكاء بصري", "ذكاء مكاني", "ذكاء رياضي"], c: 0 },
        { q: "4. تدرك الإيقاعات غير المتوقعة في محيطك وتستطيع توظيف 'الصمت' بين الأصوات لخلق معنى:", a: ["ذكاء موسيقي", "ذكاء حركي", "ذكاء ذاتي", "ذكاء لغوي"], c: 0 },
        { q: "5. تستخدم الاستعارات اللغوية لوصف مفاهيم 'مجردة' لا يدركها الآخرون إلا بالرؤية المباشرة:", a: ["ذكاء لغوي", "ذكاء اجتماعي", "ذكاء وجودي", "ذكاء بصري"], c: 0 },
        { q: "6. تستطيع 'تدوير' مجسمات معقدة في مخيلتك وتوقع شكل ظلالها قبل سقوط الضوء عليها فعلياً:", a: ["ذكاء مكاني", "ذكاء منطقي", "ذكاء طبيعي", "ذكاء حركي"], c: 0 },
        { q: "7. تمارس النقد المعرفي لقراراتك وتضع استراتيجيات لتحسين وعيك بناءً على مبادئك الأخلاقية:", a: ["ذكاء ذاتي", "ذكاء اجتماعي", "ذكاء وجودي", "ذكاء أخلاقي"], c: 0 },
        { q: "8. تشغل بالك أسئلة الوجود الكبرى وتبحث عن غايات الأشياء البعيدة عن المحسوسات:", a: ["ذكاء وجودي", "ذكاء طبيعي", "ذكاء منطقي", "ذكاء ذاتي"], c: 0 },
        { q: "9. تستطيع إيجاد 'الخيط المفقود' والأنماط المخفية بين مجموعة بيانات تبدو عشوائية للآخرين:", a: ["ذكاء منطقي", "ذكاء لغوي", "ذكاء رقمي", "ذكاء بصري"], c: 0 },
        { q: "10. ترفض الانصياع لسلوك جماعي مبرر اجتماعياً لأنك تمتلك بوصلة قيمية مستقلة تماماً:", a: ["ذكاء أخلاقي", "ذكاء اجتماعي", "ذكاء وجودي", "ذكاء ذاتي"], c: 0 },
        { q: "11. تبتكر استراتيجيات تعليمية غير تقليدية لتبسيط فكرة علمية صعبة لزملائك باستخدام المحاكاة:", a: ["ذكاء تعليمي", "ذكاء لغوي", "ذكاء حركي", "ذكاء بصري"], c: 0 },
        { q: "12. تدرك الحالة المزاجية لمن حولك بمجرد دخولك المكان من خلال تحليل 'الصمت' وحركة العيون:", a: ["ذكاء عاطفي", "ذكاء مكاني", "ذكاء اجتماعي", "ذكاء ذاتي"], c: 0 },
        { q: "13. تنجذب لفهم 'خوارزميات' التفكير الرقمي وكيفية تدفق البيانات خلف الشاشات:", a: ["ذكاء رقمي", "ذكاء منطقي", "ذكاء حركي", "ذكاء بصري"], c: 0 }
    ];

    let qi = 0, score = 0, logs = [], t, timeLeft = 25;

    function begin() {
        if(!document.getElementById('p-name').value) return alert("أدخلي اسم المبدع أولاً");
        playBeep(440);
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-section').style.display = 'block';
        loadQ();
    }

    function loadQ() {
        clearInterval(t); timeLeft = 25;
        document.getElementById('timer-fill').style.width = '100%';
        const q = quizData[qi];
        document.getElementById('q-text').innerText = q.q;
        const g = document.getElementById('o-grid'); g.innerHTML = '';
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('avatar-box').style.transform = 'scale(1) rotate(0deg)';

        q.a.forEach((opt, i) => {
            const b = document.createElement('button');
            b.className = 'option-btn'; b.innerText = opt;
            b.onclick = () => { playBeep(600); check(i, b); }; g.appendChild(b);
        });

        t = setInterval(() => {
            timeLeft--;
            document.getElementById('timer-fill').style.width = (timeLeft/25)*100 + '%';
            if(timeLeft <= 0) { clearInterval(t); check(-1, null); }
        }, 1000);
    }

    function check(idx, b) {
        clearInterval(t);
        const correct = quizData[qi].c;
        const btns = document.querySelectorAll('.option-btn');
        btns.forEach(btn => btn.style.pointerEvents = 'none');
        const av = document.getElementById('avatar-box');

        if(idx === correct) {
            b.classList.add('correct'); playBeep(880); score++;
            av.style.transform = 'scale(1.2) translateY(-20px)';
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        } else {
            if(b) b.classList.add('wrong');
            btns[correct].classList.add('correct'); playBeep(200);
            av.style.transform = 'scale(0.8) translateY(10px) rotate(-5deg)';
        }
        logs.push({ q: quizData[qi].q, a: idx === -1 ? "وقت" : quizData[qi].a[idx], s: idx === correct ? "صح" : "خطأ" });
        document.getElementById('next-btn').style.display = 'inline-block';
    }

    function nextQ() {
        qi++; if(qi < quizData.length) loadQ(); else finish();
    }

    function finish() {
        document.getElementById('quiz-section').style.display = 'none';
        document.getElementById('score-section').style.display = 'block';
        document.getElementById('score-val').innerText = `${score}/13`;
        document.getElementById('final-info').innerText = "المبدع/ة: " + document.getElementById('p-name').value + " | إشراف صفاء المصري";
        const body = document.getElementById('res-log');
        logs.forEach(l => body.innerHTML += `<tr><td style="padding:10px; font-size:0.8rem; color:#333;">${l.q}</td><td style="padding:10px; color:#222;">${l.a}</td><td style="padding:10px; font-weight:bold;">${l.s}</td></tr>`);
    }

    function adminReset() {
        if(prompt("رمز الأخصائية صفاء:") === "1234") location.reload();
    }
</script>
</body>
</html>

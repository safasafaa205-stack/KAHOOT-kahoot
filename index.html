<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مختبر الإبداع - صفاء المصري</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');

        :root { 
            --deep-blue: #003366; 
            --pearl-velvet: #fdfcfb; 
            --gold-sun: rgba(255, 215, 0, 0.4); /* تخفيف الشفافية قليلاً */
            --royal-gold: #D4AF37;
        }
        
        body { 
            font-family: 'Cairo', sans-serif; margin: 0; min-height: 100vh; 
            display: flex; justify-content: center; align-items: center; 
            background: radial-gradient(circle, #001f3f, #000);
            overflow: hidden; position: relative;
        }

        /* أشعة الشمس الذهبية */
        .sun-rays {
            position: absolute; top: -150px; right: -150px;
            width: 800px; height: 800px;
            background: radial-gradient(circle, var(--gold-sun) 0%, transparent 70%);
            z-index: 0; animation: sunGlow 6s infinite alternate;
            pointer-events: none; /* لمنع تداخلها مع الضغط */
        }
        @keyframes sunGlow { from { opacity: 0.4; transform: scale(1); } to { opacity: 0.9; transform: scale(1.05); } }

        /* الأفاتار البشري الحقيقي - أسفل اليسار */
        .girl-avatar {
            position: absolute; bottom: 30px; left: 40px; width: 180px; /* تصغير الحجم قليلاً للتناسب */
            z-index: 5; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .girl-avatar img { 
            width: 100%; height: auto; border-radius: 30px; 
            border: 4px solid var(--royal-gold);
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.5); /* تنعيم الظل */
            display: block;
        }

        /* الواجهة اللؤلؤية المخملية */
        #dashboard { 
            background: var(--pearl-velvet);
            background-image: linear-gradient(135deg, #ffffff 0%, #f1f1f1 100%);
            width: 90%; max-width: 850px; padding: 40px; 
            border-radius: 40px; border: 5px double var(--royal-gold);
            text-align: center; z-index: 10;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            position: relative; color: #333;
            overflow-y: auto; max-height: 90vh; /* إضافة تمرير إذا زاد المحتوى */
        }

        .question-card { 
            font-size: 1.4rem; margin-bottom: 25px; line-height: 1.7; text-align: right; 
            border-right: 10px solid var(--royal-gold); padding: 30px; 
            background: #fff; border-radius: 20px; color: #222;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.03);
        }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .option-btn { 
            padding: 18px; background: #fff; border: 2px solid #ddd; 
            border-radius: 15px; cursor: pointer; transition: 0.3s; 
            font-family: 'Cairo', sans-serif; font-weight: bold; color: #444; font-size: 1.1rem;
        }
        .option-btn:hover:not([disabled]) { border-color: var(--royal-gold); background: #fffdf0; transform: translateY(-3px); }
        .option-btn[disabled] { cursor: default; }

        .correct { background: #27ae60 !important; color: #fff !important; border-color: #27ae60 !important; }
        .wrong { background: #c62828 !important; color: #fff !important; border-color: #c62828 !important; }

        .btn-royal { 
            background: linear-gradient(to bottom, var(--royal-gold), #b8860b); 
            color: #fff; padding: 15px 60px; border-radius: 50px; 
            border: none; font-size: 1.2rem; font-weight: bold; cursor: pointer; 
            margin-top: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            font-family: 'Cairo', sans-serif; transition: 0.3s;
        }
        .btn-royal:hover { opacity: 0.9; transform: scale(1.03); }

        .timer-bar { width: 100%; height: 8px; background: #eee; border-radius: 10px; margin-bottom: 25px; overflow: hidden; }
        #timer-fill { width: 100%; height: 100%; background: var(--deep-blue); transition: 1s linear; }

        #final-table { width:100%; text-align:right; border-collapse: collapse; margin-top:25px; background:rgba(255,255,255,0.7); border-radius: 15px; overflow: hidden; }
        #final-table th { background: var(--deep-blue); color: #fff; padding: 15px; }
        #final-table td { padding:12px; border-bottom:1px solid #eee; color:#333; font-size: 0.95rem; }

        @media print { .no-print, .girl-avatar, .sun-rays, #next-btn, .admin-btn { display: none !important; } body { background: white; padding: 0; } #dashboard { border: none; box-shadow: none; width: 100%; max-width: 100%; padding: 0; margin: 0; position: static; } .question-card { color: black !important; border-right: 5px solid #000; } #final-table td, #final-table th { border: 1px solid #ccc; } }
        @media (max-width: 600px) { .options-grid { grid-template-columns: 1fr; } #dashboard { padding: 20px; width: 95%; } .girl-avatar { width: 120px; left: 20px; bottom: 20px; } .question-card { font-size: 1.1rem; padding: 20px; } .btn-royal { padding: 12px 40px; font-size: 1rem; } }

        #quiz-section, #score-section { display: none; }
    </style>
</head>
<body>

    <div class="sun-rays no-print"></div>

    <div class="girl-avatar no-print" id="avatar-box">
        <img id="avatar-img" src="https://images.unsplash.com/photo-1519326882834-04c334752f58?q=80&w=400&auto=format&fit=crop" alt="صفاء المصري - المساعدة الذكية">
    </div>

    <div id="dashboard">
        <div id="start-screen">
            <h1 style="color: var(--deep-blue); font-size: 2.8rem; margin: 0 0 10px 0;">مختبر الموهبة والإبداع</h1>
            <h3 style="color: var(--royal-gold); margin: 0 0 20px 0;">بإشراف الأخصائية: صفاء المصري</h3>
            <p style="font-weight: bold; color: #555; font-size: 1.2rem; margin-bottom: 30px;">تحليل المواقف المعرفية العليا (13 ذكاءً)</p>
            <div style="margin-top: 20px;">
                <input type="text" id="p-name" placeholder="اسم المبدع المتقدم" style="padding:18px; width:80%; max-width: 400px; border-radius:12px; border:2px solid #ddd; margin:10px; text-align:center; font-size:1.1rem; font-family:'Cairo', sans-serif;"><br>
                <input type="text" id="p-class" placeholder="الصف الدراسي" style="padding:18px; width:80%; max-width: 400px; border-radius:12px; border:2px solid #ddd; margin:10px; text-align:center; font-size:1.1rem; font-family:'Cairo', sans-serif;"><br>
                <button class="btn-royal" onclick="begin()">دخول المختبر ⮕</button>
            </div>
        </div>

        <div id="quiz-section">
            <div class="timer-bar"><div id="timer-fill"></div></div>
            <div id="q-text" class="question-card"></div>
            <div id="o-grid" class="options-grid"></div>
            <button id="next-btn" class="btn-royal" style="display:none;" onclick="nextQ()">تحليل الموقف التالي ⮕</button>
        </div>

        <div id="score-section">
            <h2 style="color: var(--royal-gold); font-size: 2rem; margin-top: 0;">تقرير الموهبة والذكاءات المتعددة</h2>
            <div id="final-info" style="margin-bottom:15px; font-weight:bold; font-size: 1.1rem; color: var(--deep-blue);"></div>
            <h1 id="score-val" style="font-size: 5rem; color: var(--deep-blue); margin: 5px 0;"></h1>
            
            <table id="final-table">
                <thead>
                    <tr>
                        <th>الموقف المعرفي</th>
                        <th>إجابتك</th>
                        <th>النتيجة</th>
                    </tr>
                </thead>
                <tbody id="res-log"></tbody>
            </table>
            
            <div class="no-print" style="margin-top: 30px;">
                <button class="btn-royal" onclick="window.print()">طباعة السجل الشامل 🖨️</button>
                <button class="btn-royal admin-btn" onclick="adminReset()" style="background:#444; color:#fff; margin-right:15px; box-shadow: none;">محاولة جديدة (برمز الأخصائية) 🔑</button>
            </div>
        </div>
    </div>

<script>
    // إنشاء سياق صوتي عند أول تفاعل للمستخدم (لتحسين التوافق مع المتصفحات)
    let audioCtx;
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    }

    function playBeep(f, duration = 0.3) {
        if(!audioCtx) return;
        try {
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.type = 'sine'; o.frequency.value = f; g.gain.setValueAtTime(0.1, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + duration);
        } catch(e) { console.log("Audio play blocked"); }
    }

    const quizData = [
        { q: "1. تنجذب لتفكيك الأنظمة والأجهزة المعقدة لاكتشاف خوارزميات عملها الداخلية بدقة عالية:", a: ["نمط حركي/تقني", "استنتاج منطقي", "إدراك بصري", "وعي وجودي"], c: 1 },
        { q: "2. تستطيع كشف مشاعر الآخرين الحقيقية وتوقع أفعالهم من خلال ملاحظة نبرات صوتهم العفوية:", a: ["ذكاء اجتماعي", "ذكاء ذاتي", "ذكاء لغوي", "ذكاء عاطفي"], c: 0 },
        { q: "3. تربط بين أنماط عروق أوراق الشجر ونظام جريان الأنهار في الخرائط الجغرافية بمنظور كوني:", a: ["استنتاج طبيعي", "ذكاء مكاني", "ذكاء رياضي", "ذكاء بصري"], c: 0 },
        { q: "4. تلاحظ الإيقاعات غير المتوقعة في محيطك وتستطيع توظيف 'الصمت' بين الأصوات لخلق معنى إبداعي:", a: ["ذكاء موسيقي", "ذكاء حركي", "ذكاء ذاتي", "ذكاء لغوي"], c: 0 },
        { q: "5. تستخدم الاستعارات اللغوية البليغة لوصف مفاهيم 'مجردة' فلسفية لا يدركها الآخرون بسهولة:", a: ["ذكاء لغوي", "ذكاء اجتماعي", "ذكاء وجودي", "ذكاء بصري"], c: 0 },
        { q: "6. تستطيع 'تدوير' مجسمات معقدة في مخيلتك وتوقع شكل ظلالها قبل سقوط الضوء عليها فعلياً:", a: ["ذكاء مكاني", "ذكاء منطقي", "ذكاء طبيعي", "ذكاء حركي"], c: 0 },
        { q: "7. تمارس النقد المعرفي لقراراتك وتضع استراتيجيات لتحسين وعيك بناءً على مبادئك الأخلاقية الصارمة:", a: ["ذكاء ذاتي", "ذكاء اجتماعي", "ذكاء وجودي", "ذكاء أخلاقي"], c: 0 },
        { q: "8. تشغل بالك أسئلة الوجود الكبرى وتبحث عن غايات الأشياء البعيدة عن المحسوسات المادية:", a: ["ذكاء وجودي", "ذكاء طبيعي", "ذكاء منطقي", "ذكاء ذاتي"], c: 0 },
        { q: "9. تستطيع إيجاد 'الخيط المفقود' والأنماط المعقدة المخفية بين مجموعة بيانات تبدو عشوائية للآخرين:", a: ["ذكاء منطقي/رياضي", "ذكاء لغوي", "ذكاء رقمي", "ذكاء بصري"], c: 0 },
        { q: "10. ترفض الانصياع لسلوك جماعي مبرر اجتماعياً لأنك تمتلك بوصلة قيمية داخلية مستقلة تماماً:", a: ["ذكاء أخلاقي", "ذكاء اجتماعي", "ذكاء وجودي", "ذكاء ذاتي"], c: 0 },
        { q: "11. تبتكر استراتيجيات تعليمية غير تقليدية لتبسيط فكرة علمية صعبة لزملائك باستخدام أساليب المحاكاة:", a: ["ذكاء تعليمي", "ذكاء لغوي", "ذكاء حركي", "ذكاء بصري"], c: 0 },
        { q: "12. تدرك الحالة المزاجية لمن حولك بمجرد دخولك المكان من خلال تحليل 'الصمت' وحركات العيون:", a: ["ذكاء عاطفي/وجداني", "ذكاء مكاني", "ذكاء اجتماعي", "ذكاء ذاتي"], c: 0 },
        { q: "13. تنجذب لفهم 'خوارزميات' التفكير الرقمي وكيفية معالجة وتدفق البيانات خلف الشاشات الذكية:", a: ["ذكاء رقمي", "ذكاء منطقي", "ذكاء حركي", "ذكاء بصري"], c: 0 }
    ];

    let qi = 0, score = 0, logs = [], t, timeLeft = 25;
    const totalQ = quizData.length;

    function begin() {
        const name = document.getElementById('p-name').value.trim();
        if(!name) return alert("فضلاً، أدخلي اسم المبدع أولاً");
        
        initAudio(); // تفعيل الصوت
        playBeep(440, 0.4);
        
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-section').style.display = 'block';
        loadQ();
    }

    function loadQ() {
        clearInterval(t); timeLeft = 25;
        document.getElementById('timer-fill').style.width = '100%';
        document.getElementById('timer-fill').style.background = 'var(--deep-blue)';

        const q = quizData[qi];
        document.getElementById('q-text').innerText = q.q;
        const g = document.getElementById('o-grid'); g.innerHTML = '';
        document.getElementById('next-btn').style.display = 'none';
        
        // إعادة تعيين حركة الأفاتار للوضع الطبيعي
        document.getElementById('avatar-box').style.transform = 'scale(1) rotate(0deg)';

        q.a.forEach((opt, i) => {
            const b = document.createElement('button');
            b.className = 'option-btn'; b.innerText = opt;
            b.onclick = () => { initAudio(); playBeep(600, 0.2); check(i, b); }; 
            g.appendChild(b);
        });

        t = setInterval(() => {
            timeLeft--;
            let percentage = (timeLeft/25)*100;
            document.getElementById('timer-fill').style.width = percentage + '%';
            
            if(timeLeft <= 5) {
                document.getElementById('timer-fill').style.background = '#e74c3c'; // تحذير عند اقتراب الوقت
            }

            if(timeLeft <= 0) { 
                clearInterval(t); 
                playBeep(200, 0.6);
                check(-1, null); // انتهى الوقت
            }
        }, 1000);
    }

    function check(idx, b) {
        clearInterval(t);
        const correctIdx = quizData[qi].c;
        const btns = document.querySelectorAll('.option-btn');
        btns.forEach(btn => {
            btn.style.pointerEvents = 'none'; // منع الضغط مرة أخرى
            btn.setAttribute('disabled', 'true');
        });
        
        const av = document.getElementById('avatar-box');
        let isCorrect = false;

        if(idx === correctIdx) {
            isCorrect = true;
            b.classList.add('correct'); 
            playBeep(880, 0.4); 
            score++;
            
            // تفاعل حركي سعيد للأفاتار
            av.style.transform = 'scale(1.15) translateY(-25px)';
            
            // تأثير القصاصات الورقية (Confetti)
            confetti({ particleCount: 100, spread: 60, origin: { y: 0.7 }, zIndex: 20 });
            
        } else {
            if(b) b.classList.add('wrong'); // إذا اختار خطأ
            btns[correctIdx].classList.add('correct'); // إظهار الصح
            playBeep(250, 0.5);
            
            // تفاعل حركي حزين قليلاً للأفاتار
            av.style.transform = 'scale(0.9) translateY(10px) rotate(-5deg)'; 
        }

        // تسجيل النتيجة
        logs.push({ 
            q: quizData[qi].q.substring(3), // إزالة الرقم من النص
            a: idx === -1 ? "انتهى الوقت" : quizData[qi].a[idx], 
            s: isCorrect ? "✅ صح" : "❌ خطأ" 
        });
        
        document.getElementById('next-btn').style.display = 'inline-block';
        if(qi === totalQ - 1) {
            document.getElementById('next-btn').innerText = "عرض التقرير النهائي ⮕";
        }
    }

    function nextQ() {
        qi++; 
        if(qi < totalQ) {
            loadQ();
        } else {
            finish();
        }
    }

    function finish() {
        document.getElementById('quiz-section').style.display = 'none';
        document.getElementById('score-section').style.display = 'block';
        document.getElementById('avatar-box').style.transform = 'scale(1) rotate(0deg)'; // إعادة الأفاتار لوضعه

        document.getElementById('score-val').innerText = `${score} / ${totalQ}`;
        
        const name = document.getElementById('p-name').value;
        const pClass = document.getElementById('p-class').value || "غير محدد";
        document.getElementById('final-info').innerHTML = `المبدع/ة: ${name} &nbsp; | &nbsp; الصف: ${pClass} <br> إشراف الأخصائية: صفاء المصري`;
        
        const tbody = document.getElementById('res-log');
        tbody.innerHTML = '';
        logs.forEach(l => {
            tbody.innerHTML += `<tr>
                <td>${l.q}</td>
                <td>${l.a}</td>
                <td style="font-weight:bold; color: ${l.s.includes('صح') ? '#27ae60' : '#c62828'}">${l.s}</td>
            </tr>`;
        });

        // تأثير احتفالي نهائي إذا كانت النتيجة عالية
        if(score >= totalQ * 0.7) {
            setTimeout(() => {
                confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 }, zIndex: 20 });
                playBeep(1000, 0.2); setTimeout(() => playBeep(1200, 0.2), 150);
            }, 500);
        }
    }

    function adminReset() {
        const pass = prompt("الرمز السري للأخصائية صفاء لبدء محاولة جديدة:");
        if(pass === "1234") {
            location.reload();
        } else if(pass !== null) {
            alert("الرمز غير صحيح.");
        }
    }
</script>
</body>
</html>

<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي جاردنر - الأخصائية صفاء المصري</title>
    <style>
        :root { --royal-burgundy: #800020; --royal-gold: #D4AF37; --royal-turquoise: #008080; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(-45deg, #800020, #008080, #2c3e50, #D4AF37); background-size: 400% 400%; animation: gradientBG 15s ease infinite; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        #game-container { background: rgba(255, 255, 255, 0.98); width: 95%; max-width: 800px; padding: 30px; border-radius: 25px; border: 4px double var(--royal-gold); text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.4); position: relative; max-height: 90vh; overflow-y: auto; }
        .ai-avatar { font-size: 60px; display: inline-block; animation: hover 3s infinite; margin-bottom: 10px; }
        @keyframes hover { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .question-box { font-size: 1.4rem; margin: 20px 0; color: #2c3e50; font-weight: 700; padding: 20px; background: #f8f9fa; border-radius: 15px; border-right: 8px solid var(--royal-gold); text-align: right; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .option-btn { padding: 15px; border: 2px solid #ddd; border-radius: 12px; background: white; cursor: pointer; font-weight: 600; transition: 0.3s; font-family: inherit; }
        .correct { background: #27ae60 !important; color: white; border-color: #27ae60; }
        .wrong { background: #e74c3c !important; color: white; border-color: #e74c3c; }
        .btn-action { background: var(--royal-burgundy); color: white; padding: 12px 35px; border: none; border-radius: 30px; font-size: 1.1rem; cursor: pointer; font-weight: bold; margin-top: 20px; }
        #report-table { width: 100%; border-collapse: collapse; margin-top: 20px; text-align: right; }
        #report-table th, #report-table td { border: 1px solid #ddd; padding: 10px; font-size: 0.9rem; }
        @media print { .no-print, .btn-action, .ai-avatar { display: none !important; } body { background: white; } #game-container { border: 2px solid #000; width: 100%; box-shadow: none; } }
        #quiz-section, #score-container { display: none; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ai-bot" class="ai-avatar">🤖</div>

    <div id="start-screen">
        <h2 style="color: var(--royal-burgundy); margin-bottom: 5px;">تحدي الذكاءات الـ 13 الملكي</h2>
        <h4 style="color: var(--royal-turquoise); margin-top: 0;">بإشراف الأخصائية: صفاء المصري</h4>
        <p style="font-size: 0.9rem; font-weight: bold;">تربية خاصة - موهبة وإبداع</p>
        <input type="text" id="s-name" placeholder="اسم المتقدم للمسابقة" style="padding:12px; width:80%; margin:10px; border-radius:10px; border:2px solid gold; text-align: center;"><br>
        <input type="text" id="s-class" placeholder="الصف الدراسي" style="padding:12px; width:80%; margin:10px; border-radius:10px; border:2px solid gold; text-align: center;"><br>
        <button class="btn-action" onclick="startQuiz()">ابدأ رحلة الإبداع ⮕</button>
    </div>

    <div id="quiz-section">
        <div id="msg" style="font-weight:bold; color:var(--royal-turquoise); margin-bottom:10px;">ركز يا بطل! الموهبة تنتظرك.</div>
        <div id="question" class="question-box"></div>
        <div id="options" class="options-grid"></div>
        <button id="next-btn" class="btn-action" style="display:none;" onclick="loadNextQuestion()">السؤال التالي ⮕</button>
    </div>

    <div id="score-container">
        <h2 style="color: var(--royal-burgundy);">✨ سجل الموهبة والإبداع ✨</h2>
        <p>إشراف: الأخصائية صفاء المصري</p>
        <div id="final-info" style="font-weight: bold; margin-bottom: 10px;"></div>
        <h1 id="final-score" style="font-size: 3rem; color: var(--royal-turquoise);"></h1>
        <div id="award" style="margin-bottom: 20px;"></div>
        
        <table id="report-table">
            <thead><tr><th>السؤال</th><th>إجابتك</th><th>النتيجة</th></tr></thead>
            <tbody id="report-body"></tbody>
        </table>

        <div class="no-print">
            <button class="btn-action" onclick="window.print()" style="background:var(--royal-turquoise)">طباعة السجل والوسام 🖨️</button>
            <button class="btn-action" onclick="location.reload()" style="background:#7f8c8d; margin-right:10px;">إعادة</button>
        </div>
    </div>
</div>

<script>
    // برمجة الصوت الداخلي لضمان العمل 100%
    const playNote = (f, t) => {
        const c = new (window.AudioContext || window.webkitAudioContext)();
        const o = c.createOscillator();
        const g = c.createGain();
        o.type = t; o.frequency.value = f;
        g.gain.setValueAtTime(0.1, c.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + 0.5);
        o.connect(g); g.connect(c.destination);
        o.start(); o.stop(c.currentTime + 0.5);
    };

    const quizData = [
        { q: "1. تفضل تفكيك الأجهزة القديمة لفهم كيفية عملها وتستمتع بالأعمال اليدوية الدقيقة:", options: ["الذكاء المكاني", "الذكاء الحركي", "الذكاء المنطقي", "الذكاء الطبيعي"], correct: 1 },
        { q: "2. لديك قدرة عالية على قراءة مشاعر الآخرين وفهم دوافعهم غير المعلنة بسهولة:", options: ["الذكاء الذاتي", "الذكاء الاجتماعي", "الذكاء الوجودي", "الذكاء اللغوي"], correct: 1 },
        { q: "3. تستمتع بتصنيف الأشياء في الطبيعة (كالصخور أو النباتات) بناءً على أنماطها العلمية:", options: ["الذكاء المنطقي", "الذكاء البصري", "الذكاء الطبيعي", "الذكاء الوجودي"], correct: 2 },
        { q: "4. تدرك التغيرات الطفيفة في نغمات الأصوات وتستطيع حفظ الألحان بسرعة مذهلة:", options: ["الذكاء الموسيقي", "الذكاء المنطقي", "الذكاء الذاتي", "الذكاء اللغوي"], correct: 0 },
        { q: "5. تستخدم الكلمات بدقة وبلاغة لتوصيل مفاهيم معقدة وتستمتع بالألعاب اللغوية:", options: ["الذكاء الاجتماعي", "الذكاء اللغوي", "الذكاء الوجودي", "الذكاء البصري"], correct: 1 },
        { q: "6. تستطيع تخيل الأجسام ثلاثية الأبعاد في عقلك وتدويرها بسهولة قبل رسمها أو صنعها:", options: ["الذكاء المنطقي", "الذكاء البصري المكاني", "الذكاء الحركي", "الذكاء الطبيعي"], correct: 1 },
        { q: "7. تمتلك وعياً عميقاً بنقاط قوتك وضعفك وتعرف تماماً كيف تدير مشاعرك لتحقيق أهدافك:", options: ["الذكاء الاجتماعي", "الذكاء الذاتي", "الذكاء الوجودي", "الذكاء المنطقي"], correct: 1 },
        { q: "8. كثيراً ما تتساءل عن معنى الحياة، الموت، والكون، والأسباب العميقة لوجودنا:", options: ["الذكاء الطبيعي", "الذكاء الوجودي", "الذكاء الذاتي", "الذكاء الاجتماعي"], correct: 1 },
        { q: "9. تستمتع بحل الألغاز المعقدة والتعامل مع الأرقام والأنماط الهندسية المجردة:", options: ["الذكاء المنطقي الرياضي", "الذكاء البصري", "الذكاء اللغوي", "الذكاء الحركي"], correct: 0 },
        { q: "10. القدرة على اتخاذ قرارات أخلاقية مبنية على قيم عميقة ومبادئ ثابتة (الذكاء الأخلاقي):", options: ["الذكاء الاجتماعي", "الذكاء الوجودي", "الذكاء الأخلاقي", "الذكاء الطبيعي"], correct: 2 },
        { q: "11. القدرة على تعليم الآخرين وتبسيط المعلومات المعقدة ببراعة (الذكاء التعليمي):", options: ["الذكاء اللغوي", "الذكاء التعليمي", "الذكاء الذاتي", "الذكاء الموسيقي"], correct: 1 },
        { q: "12. الحساسية العالية تجاه الحالة النفسية للآخرين والاستجابة لها بتعاطف (الذكاء العاطفي):", options: ["الذكاء الاجتماعي", "الذكاء العاطفي", "الذكاء الوجودي", "الذكاء اللغوي"], correct: 1 },
        { q: "13. القدرة على إدراك الأنماط الرقمية والتنبؤ بالنتائج في الأنظمة التقنية (الذكاء الرقمي):", options: ["الذكاء المنطقي", "الذكاء الرقمي", "الذكاء البصري", "الذكاء الحركي"], correct: 1 }
    ];

    let currentIdx = 0, score = 0, userAnswers = [];

    function startQuiz() {
        const name = document.getElementById('s-name').value;
        const sClass = document.getElementById('s-class').value;
        if(!name || !sClass) return alert("فضلاً أدخل البيانات!");
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-section').style.display = 'block';
        loadQuestion();
    }

    function loadQuestion() {
        const current = quizData[currentIdx];
        document.getElementById('question').innerText = current.q;
        const opts = document.getElementById('options');
        opts.innerHTML = ''; document.getElementById('next-btn').style.display = 'none';
        document.getElementById('ai-bot').innerText = "🤖";
        current.options.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn'; btn.innerText = opt;
            btn.onclick = () => check(idx, btn); opts.appendChild(btn);
        });
    }

    function check(idx, btn) {
        const correct = quizData[currentIdx].correct;
        const btns = document.querySelectorAll('.option-btn');
        btns.forEach(b => b.style.pointerEvents = 'none');
        if(idx === correct) {
            btn.classList.add('correct'); playNote(880, 'sine'); score++;
            document.getElementById('ai-bot').innerText = "🌟";
        } else {
            btn.classList.add('wrong'); btns[correct].classList.add('correct');
            playNote(220, 'square'); document.getElementById('ai-bot').innerText = "🧐";
        }
        userAnswers.push({ q: quizData[currentIdx].q, a: quizData[currentIdx].options[idx], s: idx === correct ? "✅" : "❌" });
        document.getElementById('next-btn').style.display = 'inline-block';
    }

    function loadNextQuestion() {
        currentIdx++; if(currentIdx < quizData.length) loadQuestion(); else showFinal();
    }

    function showFinal() {
        document.getElementById('quiz-section').style.display = 'none';
        document.getElementById('score-container').style.display = 'block';
        document.getElementById('final-score').innerText = `${score} / ${quizData.length}`;
        document.getElementById('final-info').innerText = "المبدع/ة: " + document.getElementById('s-name').value + " | الصف: " + document.getElementById('s-class').value;
        if(score >= 11) {
            document.getElementById('award').innerHTML = '<h2 style="color:gold;">🌟 وسام الموهبة الفائق 🌟</h2>';
            document.getElementById('ai-bot').innerText = "👑";
        }
        const tbody = document.getElementById('report-body');
        userAnswers.forEach(ans => { tbody.innerHTML += `<tr><td>${ans.q}</td><td>${ans.a}</td><td>${ans.s}</td></tr>`; });
    }
</script>
</body>
</html>

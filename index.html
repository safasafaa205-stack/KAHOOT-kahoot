<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي الموهبة - صفاء المصري</title>
    <script src="https://cdnjs.cloudflare.com"></script>
    <style>
        :root { --gold: #FFD700; --neon-cyan: #00f2ff; --bg: #000000; --panel: #1a1a1a; }
        body { font-family: 'Cairo', sans-serif; margin: 0; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }

        /* الأفاتار: الطفلة والوردة */
        .avatar-3d { width: 140px; height: 180px; margin: 0 auto 20px; position: relative; transition: 0.5s; }
        .girl-head { width: 60px; height: 65px; background: #ffe0bd; border-radius: 50% 50% 45% 45%; margin: 0 auto; position: relative; border: 2px solid #5d4037; }
        .hair { width: 70px; height: 40px; background: #4e342e; position: absolute; top: -10px; left: -5px; border-radius: 40px 40px 0 0; }
        .eye { width: 8px; height: 8px; background: #000; border-radius: 50%; position: absolute; top: 30px; transition: 0.3s; }
        .eye.l { left: 15px; } .eye.r { right: 15px; }
        .smile { width: 25px; height: 12px; border-bottom: 3px solid #d32f2f; border-radius: 50%; position: absolute; bottom: 15px; left: 17px; transition: 0.5s; }
        .rose { position: absolute; bottom: -30px; right: -20px; font-size: 40px; animation: sway 3s infinite ease-in-out; }
        @keyframes sway { 0%, 100% { transform: rotate(-5deg); } 50% { transform: rotate(15deg); } }

        /* الواجهة ثلاثية الأبعاد */
        #main-board { 
            background: var(--panel); width: 90%; max-width: 850px; padding: 40px; 
            border-radius: 30px; border: 2px solid var(--gold); text-align: center;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.2); position: relative;
            transform-style: preserve-3d; transform: rotateX(5deg);
        }

        .timer-ring { 
            width: 70px; height: 70px; border-radius: 50%; border: 4px solid var(--neon-cyan);
            margin: 0 auto 20px; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 1.5rem; text-shadow: 0 0 10px var(--neon-cyan);
        }

        .question-card { 
            background: #252525; padding: 30px; border-radius: 20px; font-size: 1.4rem;
            margin-bottom: 25px; border-right: 10px solid var(--gold); text-align: right;
            animation: slideIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes slideIn { from { opacity: 0; transform: translateZ(-200px); } to { opacity: 1; transform: translateZ(0); } }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .opt-btn { 
            padding: 20px; background: #333; color: white; border: 1px solid #555;
            border-radius: 15px; cursor: pointer; font-size: 1.1rem; transition: 0.3s;
        }
        .opt-btn:hover { background: var(--gold); color: black; transform: scale(1.05); }

        .action-btn { 
            background: var(--neon-cyan); color: black; padding: 15px 45px; 
            border: none; border-radius: 50px; font-size: 1.2rem; cursor: pointer; font-weight: bold;
            margin: 10px; box-shadow: 0 0 20px var(--neon-cyan);
        }

        @media print { .no-print { display: none !important; } body { background: white; color: black; } #main-board { border: 1px solid #000; box-shadow: none; width: 100%; color: black !important; } }
        #quiz-part, #result-part { display: none; }
    </style>
</head>
<body>

<div id="main-board">
    <div class="avatar-3d no-print" id="avatar">
        <div class="girl-head">
            <div class="hair"></div>
            <div class="eye l" id="el"></div><div class="eye r" id="er"></div>
            <div class="smile" id="sm"></div>
        </div>
        <div class="rose">🌹</div>
    </div>

    <!-- شاشة البداية -->
    <div id="start-screen">
        <h1 style="color: var(--gold);">مختبر الموهبة والإبداع</h1>
        <h3 style="color: var(--neon-cyan);">بإشراف الأخصائية: صفاء المصري</h3>
        <input type="text" id="std-name" placeholder="اسم المبدع/ة" style="padding:15px; width:70%; margin:10px; border-radius:10px; border:none; text-align:center;"><br>
        <input type="text" id="std-class" placeholder="الصف" style="padding:15px; width:70%; margin:10px; border-radius:10px; border:none; text-align:center;"><br>
        <button class="action-btn" onclick="start()">دخول المختبر ⮕</button>
    </div>

    <!-- قسم الأسئلة -->
    <div id="quiz-part">
        <div class="timer-ring" id="timer">15</div>
        <div id="q-box" class="question-card"></div>
        <div id="o-grid" class="options-grid"></div>
        <button id="nxt" class="action-btn" style="display:none;" onclick="nextQ()">السؤال التالي</button>
    </div>

    <!-- قسم النتائج -->
    <div id="result-part">
        <h2 style="color: var(--gold);">تقرير تحليل الموهبة</h2>
        <div id="std-info" style="margin-bottom:20px; font-weight:bold; color:var(--neon-cyan);"></div>
        <h1 id="res-score" style="font-size: 4rem;"></h1>
        <table id="rep" style="width:100%; text-align:right; border-collapse:collapse; background:rgba(255,255,255,0.1);">
            <tbody id="rep-body"></tbody>
        </table>
        <div class="no-print">
            <button class="action-btn" onclick="window.print()">طباعة السجل 🖨️</button>
            <button class="action-btn" onclick="askRetry()" style="background:#555; color:white;">محاولة جديدة (للمعلمة) 🔑</button>
        </div>
    </div>
</div>

<!-- أصوات النقر -->
<audio id="aud-click" src="https://www.soundjay.com"></audio>
<audio id="aud-win" src="https://www.soundjay.com"></audio>
<audio id="aud-lose" src="https://www.soundjay.com"></audio>

<script>
    const data = [
        { q: "1. هل تستمتع بتفكيك الأجهزة المعقدة لاكتشاف منطق عملها الداخلي؟", a: ["حركي/تقني", "منطقي"], c: 0 },
        { q: "2. هل تستطيع التنبؤ بردود فعل الآخرين بناءً على مراقبة تعابير وجوههم؟", a: ["اجتماعي", "ذاتي"], c: 0 },
        { q: "3. هل تربط بين أنماط الطبيعة (كعروق الشجر) وقوانين العلم الكونية؟", a: ["طبيعي", "بصري"], c: 0 },
        { q: "4. هل تلاحظ الإيقاعات الخفية في أصوات المحركات أو قطرات الماء؟", a: ["موسيقي", "حركي"], c: 0 },
        { q: "5. هل تستخدم لغة بليغة وتشبيهات غريبة لوصف مشاعرك العميقة؟", a: ["لغوي", "اجتماعي"], c: 0 },
        { q: "6. هل تبني خرائط ذهنية للأماكن في عقلك وتحدد الاتجاهات بدقة؟", a: ["مكاني", "منطقي"], c: 0 },
        { q: "7. هل تحلل أسباب غضبك وتضع خطة لتطوير ردود أفعالك مستقبلاً؟", a: ["ذاتي", "وجودي"], c: 0 },
        { q: "8. هل تشغل بالك غايات الوجود الكبرى ومعنى الحياة والكون؟", a: ["وجودي", "طبيعي"], c: 0 },
        { q: "9. هل تجد علاقات منطقية مخفية بين مجموعة بيانات تبدو عشوائية؟", a: ["منطقي", "رقمي"], c: 0 },
        { q: "10. هل ترفض التقليد الأعمى وتتبع بوصلة قيمية داخلية مستقلة؟", a: ["أخلاقي", "اجتماعي"], c: 0 },
        { q: "11. هل تبتكر وسائل ذكية لتبسيط فكرة علمية صعبة لزملائك؟", a: ["تعليمي", "لغوي"], c: 0 },
        { q: "12. هل تشعر 'بثقل الجو' أو بهجته فور دخولك لمكان ما؟", a: ["عاطفي", "مكاني"], c: 0 },
        { q: "13. هل تنجذب لفهم الخوارزميات وتدفق البيانات في الأنظمة الرقمية؟", a: ["رقمي", "منطقي"], c: 0 }
    ];

    let qi = 0, score = 0, logs = [], t, timeLeft = 15;
    const click = document.getElementById('aud-click');

    function start() {
        click.play();
        if(!document.getElementById('std-name').value) return alert("أدخلي اسم المبدع أولاً");
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-part').style.display = 'block';
        load();
    }

    function runTimer() {
        clearInterval(t); timeLeft = 15;
        document.getElementById('timer').innerText = timeLeft;
        t = setInterval(() => {
            timeLeft--; document.getElementById('timer').innerText = timeLeft;
            if(timeLeft <= 0) { clearInterval(t); check(-1, null); }
        }, 1000);
    }

    function load() {
        runTimer();
        const q = data[qi];
        document.getElementById('q-box').innerText = q.q;
        const g = document.getElementById('o-grid'); g.innerHTML = '';
        document.getElementById('nxt').style.display = 'none';
        resetAvatar();

        q.a.forEach((o, i) => {
            const b = document.createElement('button'); b.className = 'opt-btn';
            b.innerText = o; b.onclick = () => { click.play(); check(i, b); }; g.appendChild(b);
        });
    }

    function check(i, b) {
        clearInterval(t);
        const c = data[qi].c;
        const all = document.querySelectorAll('.opt-btn');
        all.forEach(x => x.style.pointerEvents = 'none');
        const sm = document.getElementById('sm');
        const el = document.getElementById('el'); const er = document.getElementById('er');

        if(i === c) {
            b.style.background = '#27ae60'; document.getElementById('aud-win').play(); score++;
            sm.style.height = '18px'; sm.style.borderBottom = '4px solid #1b5e20'; // ابتسامة
            confetti({ particleCount: 100, spread: 70 });
        } else {
            if(b) b.style.background = '#c62828'; all[c].style.background = '#27ae60';
            document.getElementById('aud-lose').play();
            sm.style.height = '2px'; sm.style.borderBottom = '3px solid #333'; // حزن
            el.style.transform = 'translateY(3px)'; er.style.transform = 'translateY(3px)';
        }
        logs.push({ q: data[qi].q, a: i === -1 ? "انتهى الوقت" : data[qi].a[i], s: i === c ? "صح" : "خطأ" });
        document.getElementById('nxt').style.display = 'inline-block';
    }

    function resetAvatar() {
        document.getElementById('sm').style.height = '12px';
        document.getElementById('sm').style.borderBottom = '3px solid #d32f2f';
        document.getElementById('el').style.transform = 'none';
        document.getElementById('er').style.transform = 'none';
    }

    function nextQ() {
        click.play();
        qi++; if(qi < data.length) load(); else finish();
    }

    function finish() {
        document.getElementById('quiz-part').style.display = 'none';
        document.getElementById('result-part').style.display = 'block';
        document.getElementById('res-score').innerText = `${score}/${data.length}`;
        document.getElementById('std-info').innerText = "المبدع/ة: " + document.getElementById('std-name').value + " | إشراف صفاء المصري";
        const body = document.getElementById('rep-body');
        logs.forEach(l => body.innerHTML += `<tr style="border-bottom:1px solid #444"><td style="padding:10px">${l.q}</td><td style="padding:10px">${l.a}</td><td style="padding:10px">${l.s}</td></tr>`);
    }

    function askRetry() {
        const p = prompt("أدخلي الرمز السري للمعلمة (صفاء المصري):");
        if(p === "1234") location.reload(); else alert("الرمز خاطئ!");
    }
</script>
</body>
</html>
